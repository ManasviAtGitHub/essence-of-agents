<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Essence of the Frontier</title>
<link rel="stylesheet" href="../assets/theme.css" />
<style>
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--ink); font:15px/1.55 system-ui,-apple-system,Segoe UI,sans-serif;
         display:flex; min-height:100vh; }
  #side { width:270px; min-width:270px; border-right:1px solid var(--line); background:#0d1014;
          overflow-y:auto; padding-bottom:24px; }
  .brand { display:flex; align-items:center; gap:10px; padding:16px 18px 8px; }
  .brand .chr svg { width:34px; height:34px; }
  .bt { font-family:var(--serif); font-weight:600; font-size:17px; }
  .dot { color:var(--green); }
  .homelink { display:block; padding:2px 18px 8px; color:var(--dim); font-size:12.5px; text-decoration:none; }
  .homelink:hover { color:var(--ink); }
  .gnote { color:var(--faint); font-size:11.5px; line-height:1.5; }
  .group { margin-top:10px; }
  .gh { font:10.5px var(--mono); text-transform:uppercase; letter-spacing:.08em; color:var(--faint); padding:6px 18px 4px; }
  .navlink { display:block; width:100%; text-align:left; font:inherit; font-size:13.5px; color:var(--dim);
             background:none; border:0; border-left:2px solid transparent; padding:7px 18px; cursor:pointer; }
  .navlink:hover { color:var(--ink); background:#12161c; }
  .navlink.active { color:var(--ink); border-left-color:var(--green); background:#12171e; }
  .tolink { display:block; padding:10px 18px; margin-top:14px; border-top:1px solid var(--line);
            color:var(--dim); font-size:12.5px; text-decoration:none; }
  .tolink b { color:var(--ink); display:block; }
  .tolink:hover b { color:var(--green); }
  .tolink .sub2 { font-size:11px; color:var(--faint); }

  #main { flex:1; display:flex; flex-direction:column; min-width:0; }
  #bar { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid var(--line); background:#0d1014; }
  #bar button { font:inherit; font-size:12.5px; border:1px solid var(--line); background:var(--panel); color:var(--dim);
                border-radius:8px; padding:5px 12px; cursor:pointer; }
  #bar button:hover:not(:disabled) { color:var(--ink); }
  #bar button:disabled { opacity:.35; cursor:default; }
  #now { flex:1; min-width:0; font-size:13px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #now .mod { color:var(--green); font:11px var(--mono); margin-right:8px; }
  #count { font:11px var(--mono); color:var(--faint); }
  #ext { font-size:12px; color:var(--faint); text-decoration:none; }
  #ext:hover { color:var(--ink); }
  #lesson { border-bottom:1px solid var(--line); background:#0e1116; padding:0 16px; }
  #lesson details { padding:9px 0; }
  #lesson summary { cursor:pointer; list-style:none; font-size:13px; color:var(--dim); }
  #lesson summary .qk { font:10px var(--mono); text-transform:uppercase; letter-spacing:.07em; color:var(--green); margin-right:8px; }
  #lesson .lbody { padding:8px 2px 4px; font-size:13.5px; color:#d3d8de; max-width:900px; }
  #lesson a { color:var(--blue); }
  #frame { flex:1; border:0; width:100%; background:var(--bg); }
</style>
</head>
<body>
<nav id="side" aria-label="Frontier track navigation"></nav>
<div id="main">
  <div id="bar">
    <button id="prev">&larr; prev</button>
    <div id="now"></div>
    <span id="count"></span>
    <button id="next">next &rarr;</button>
    <a id="ext" target="_blank" rel="noopener" title="open widget alone">open &nearr;</a>
  </div>
  <div id="lesson" hidden></div>
  <iframe id="frame" title="frontier widget"></iframe>
</div>

<script src="../assets/cast.js"></script>
<script>
const NAV = [
  { m:"F1 - Everything becomes a token", items:[
    { label:"The patch stream (photo -> tokens)", src:"module-f1-tokens/widgets/patch-stream/index.html" },
  ]},
  { m:"F2 - Attention unchained", items:[
    { label:"Three escapes from the two bills", src:"module-f2-attention/widgets/three-escapes/index.html" },
  ]},
  { m:"F3 - RL eats the pipeline", items:[
    { label:"Reward everywhere (the invasion)", src:"module-f3-rl/widgets/reward-everywhere/index.html" },
  ]},
  { m:"F4 - The loop learns itself", items:[
    { label:"The trained loop (script -> weights)", src:"module-f4-agents/widgets/trained-loop/index.html" },
  ]},
  { m:"F5 - The loop gets a body", items:[
    { label:"The embodied loop (camera -> motor)", src:"module-f5-body/widgets/embodied-loop/index.html" },
  ]},
  { m:"F6 - Tokens versus worlds", items:[
    { label:"The dissent (next token vs the world)", src:"module-f6-dissent/widgets/tokens-vs-worlds/index.html" },
  ]},
  { m:"F7 - The dated atlas", items:[
    { label:"The dated atlas (every headline, pinned)", src:"module-f7-atlas/widgets/dated-atlas/index.html" },
  ]},
];

const LESSONS = {
  "F7 - The dated atlas": { q:"You have met about fifty 2026 headlines across F1-F6. How do they relate - and when a new one drops next week, where does it go?",
    aha:"Every headline attacks a principle you already own. The atlas pins each exhibit (name, month, source) to the principle it attacks and the lane it sits in, then lets you filter. Pick 'predict the next token' and watch it hit from Foundation (diffusion, world models, JEPA) AND the Body lane (world-action robots) - and DEFENDED from Tokens (the autoregressive image generator that beats diffusion at its own game). Pick a lane to walk one chapter. A timeline rail plots the shown pins across 2025->2026; UNVERIFIED items are flagged, counter-exhibits marked. The page ages; the columns it sorts into do not. Verified as of 2026-07." },
  "F6 - Tokens versus worlds": { q:"Reading, talking, looping, moving - Cortex did all of it by predicting the next token. In 2026, roughly two billion dollars of new labs bet that foundation is wrong. What do they predict instead?",
    aha:"Three escapes from 'predict the next token, left to right.' DIFFUSION denoises the whole sentence in parallel - still tokens, just not one at a time (LLaDA converted from an AR model; Mercury >1000 tok/s). WORLD MODELS predict the next FRAME of a world you can steer - the 'token' becomes a frame (Genie -> a consumer product; Cosmos unifies sim+reason+act). JEPA predicts in REPRESENTATION space and generates nothing - the loss lives in latent space (V-JEPA plans robot moves there; LeCun's ~$2B bet). The honest counter: this same year images, audio and actions all BECAME tokens, the best image generator is autoregressive, and most diffusion LLMs are converted from token models. So next-token prediction is not physics - it is a bet, currently winning, now seriously contested. A new character, Somni, predicts the world where Cortex predicts the word. Verified as of 2026-07." },
  "F5 - The loop gets a body": { q:"An agent's tools were functions. What happens when the tool is a motor and the observation is a camera - and how does a token become a movement?",
    aha:"A VLA is a VLM whose output tokens ARE actions. The camera enters as F1's patches; the goal enters as words; the next tokens come from a new part of M1's menu - ACTIONS - decoded to joint angles that move a real arm. To fit a smooth motion into tokens it is DCT-compressed (keep the big coefficients) then BPE-tokenized (pi-0.7 + FAST) - M1's exact algorithm on a motor, and reversibly. The honest counter: tokens are slow (~7-9 Hz); smooth control wants ~200 Hz, so Figure Helix splits it - slow tokens choose WHAT, a fast continuous policy handles HOW. No winner declared. Verified as of 2026-07." },
  "F4 - The loop learns itself": { q:"You hand-wrote the agent loop in course 1. The 2026 labs do not. What replaced your while loop?",
    aha:"Weights. Tongyi DeepResearch trains the whole search/read/reason loop end to end (leave-one-out advantages over full trajectories - computed in the widget); Cursor Composer's test-running EMERGED from reward; Kimi's PARL trains the ORCHESTRATOR itself (spawn up to ~100 workers; serial collapse is the named failure, reward shaping the fix). Meanwhile the plumbing froze into standards (MCP -> foundation, A2A v1.0) and the sandbox stayed code - behavior in weights, interfaces in standards, walls in code. Verified as of 2026-07." },
  "F3 - RL eats the pipeline": { q:"M6 drew four tidy stages with RL as the last polish. Where does the reward signal actually live in 2026?",
    aha:"Everywhere. RLP puts RL inside pretraining (thoughts rewarded by information gain); Tongyi inserted a NEW agentic mid-training stage; the GRPO zoo debugged post-training flaw by flaw (Dr.GRPO's length-bias fix computed in the widget); TTRL keeps training at TEST TIME via majority-vote pseudo-rewards. And DeepSeek-V4 merges M7 with M8: GRPO trains specialists, on-policy distillation fuses them - RL makes the teachers, distillation makes the model. Verified as of 2026-07." },
  "F2 - Attention unchained": { q:"Track 3 said attention must compare against everything and remember everything. The 2026 flagships do neither. How?",
    aha:"Three positions in a live argument. SPARSE: a cheap learned indexer ranks every past token, exact attention reads only the top-k (NSA -> DSA -> V4; reads collapse, storage survives until compression). LINEAR: replace the growing KV with a fixed-size state folded forward - O(1) memory, but the state must forget (DeltaNet -> KDA -> Qwen3.5). THE DISSENT: MiniMax M2 went BACK to full attention after hybrids degraded multi-hop reasoning at scale. No winner declared - the field has not declared one. Verified as of 2026-07." },
  "F1 - Everything becomes a token": { q:"The model only reads tokens. How is it suddenly looking at photos and answering with pictures?",
    aha:"The menu grows through two doors. IN: images are cut into patches and PROJECTED into the same vector space as word embeddings (not a menu lookup - attention treats them like any h). OUT: to emit images or speech the menu literally grows - a learned CODEBOOK the model samples autoregressively (for sound, QUANTIZATION snaps each ~20ms frame to its nearest entry). And the names are wiring diagrams, not species: ViT -> CLIP -> VLM (eye + projector + LLM) -> native (seam removed) -> VLA (actions out). Verified as of 2026-07." },
};

const side=document.getElementById("side"), frame=document.getElementById("frame"),
      now=document.getElementById("now"), ext=document.getElementById("ext"),
      prev=document.getElementById("prev"), next=document.getElementById("next"),
      count=document.getElementById("count"), lesson=document.getElementById("lesson");

const flat=[]; NAV.forEach(g=>g.items.forEach(it=>flat.push({...it, module:g.m})));

side.innerHTML =
  '<div class="brand"><span class="chr" data-c="cortex" data-e="reach"></span><span class="bt">Essence of the Frontier<span class="dot">.</span></span></div>' +
  '<a class="homelink" href="../index.html">&larr; all tracks</a>' +
  '<div class="gnote" style="padding:6px 18px">Track 4 - every 2026 headline, mapped to a principle you own. Verified as of 2026-07; exhibits age, the mapping does not. Modules land one by one.</div>' +
  NAV.map(g=>'<div class="group"><div class="gh">'+g.m+'</div>'+
    g.items.map(it=>'<button class="navlink" data-src="'+it.src+'">'+it.label+'</button>').join("")+'</div>').join("") +
  '<a class="tolink" href="../models/index.html"><b>&larr; Inside the Model</b><span class="sub2">the principles these exhibits attack</span></a>' +
  '<a class="tolink" href="../agentic-course/index.html"><b>&larr; The course</b><span class="sub2">the loop it all started from</span></a>';

Cast.render(side);

let curIdx=0;
function load(src){
  const i=flat.findIndex(x=>x.src===src); curIdx=i<0?0:i;
  const item=flat[curIdx];
  frame.src=item.src;
  now.innerHTML='<b class="mod">'+item.module+'</b><span class="lbl">'+item.label+'</span>';
  ext.href=item.src;
  count.textContent=(curIdx+1)+" / "+flat.length;
  location.hash=encodeURIComponent(item.src);
  prev.disabled=curIdx===0; next.disabled=curIdx===flat.length-1;
  document.querySelectorAll(".navlink").forEach(a=>a.classList.toggle("active",a.dataset.src===item.src));
  const L=LESSONS[item.module];
  if(L){ const readme=item.src.includes("/widgets/")?item.src.split("/widgets/")[0]+"/README.md":null;
    lesson.hidden=false;
    lesson.innerHTML='<details><summary><span class="qk">the question</span>'+L.q+'</summary>'+
      '<div class="lbody"><p><b>The idea:</b> '+L.aha+'</p>'+
      (readme?'<a href="'+readme+'" target="_blank" rel="noopener">Read the full written lesson (README) &rarr;</a>':"")+
      '</div></details>';
  } else { lesson.hidden=true; lesson.innerHTML=""; }
}
side.querySelectorAll(".navlink").forEach(a=>a.onclick=()=>load(a.dataset.src));
prev.onclick=()=>{ if(curIdx>0) load(flat[curIdx-1].src); };
next.onclick=()=>{ if(curIdx<flat.length-1) load(flat[curIdx+1].src); };
const initial=location.hash?decodeURIComponent(location.hash.slice(1)):flat[0].src;
load(initial);
</script>
</body>
</html>
