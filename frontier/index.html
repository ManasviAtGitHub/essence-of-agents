<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Essence of the Frontier</title>
<link rel="stylesheet" href="../assets/theme.css" />
<style>
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--ink); font:15px/1.55 system-ui,-apple-system,Segoe UI,sans-serif;
         display:flex; min-height:100vh; }
  #side { width:270px; min-width:270px; border-right:1px solid var(--line); background:#0d1014;
          overflow-y:auto; padding-bottom:24px; }
  .brand { display:flex; align-items:center; gap:10px; padding:16px 18px 8px; }
  .brand .chr svg { width:34px; height:34px; }
  .bt { font-family:var(--serif); font-weight:600; font-size:17px; }
  .dot { color:var(--green); }
  .homelink { display:block; padding:2px 18px 8px; color:var(--dim); font-size:12.5px; text-decoration:none; }
  .homelink:hover { color:var(--ink); }
  .gnote { color:var(--faint); font-size:11.5px; line-height:1.5; }
  .group { margin-top:10px; }
  .gh { font:10.5px var(--mono); text-transform:uppercase; letter-spacing:.08em; color:var(--faint); padding:6px 18px 4px; }
  .navlink { display:block; width:100%; text-align:left; font:inherit; font-size:13.5px; color:var(--dim);
             background:none; border:0; border-left:2px solid transparent; padding:7px 18px; cursor:pointer; }
  .navlink:hover { color:var(--ink); background:#12161c; }
  .navlink.active { color:var(--ink); border-left-color:var(--green); background:#12171e; }
  .tolink { display:block; padding:10px 18px; margin-top:14px; border-top:1px solid var(--line);
            color:var(--dim); font-size:12.5px; text-decoration:none; }
  .tolink b { color:var(--ink); display:block; }
  .tolink:hover b { color:var(--green); }
  .tolink .sub2 { font-size:11px; color:var(--faint); }

  #main { flex:1; display:flex; flex-direction:column; min-width:0; }
  #bar { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid var(--line); background:#0d1014; }
  #bar button { font:inherit; font-size:12.5px; border:1px solid var(--line); background:var(--panel); color:var(--dim);
                border-radius:8px; padding:5px 12px; cursor:pointer; }
  #bar button:hover:not(:disabled) { color:var(--ink); }
  #bar button:disabled { opacity:.35; cursor:default; }
  #now { flex:1; min-width:0; font-size:13px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #now .mod { color:var(--green); font:11px var(--mono); margin-right:8px; }
  #count { font:11px var(--mono); color:var(--faint); }
  #ext { font-size:12px; color:var(--faint); text-decoration:none; }
  #ext:hover { color:var(--ink); }
  #lesson { border-bottom:1px solid var(--line); background:#0e1116; padding:0 16px; }
  #lesson details { padding:9px 0; }
  #lesson summary { cursor:pointer; list-style:none; font-size:13px; color:var(--dim); }
  #lesson summary .qk { font:10px var(--mono); text-transform:uppercase; letter-spacing:.07em; color:var(--green); margin-right:8px; }
  #lesson .lbody { padding:8px 2px 4px; font-size:13.5px; color:#d3d8de; max-width:900px; }
  #lesson a { color:var(--blue); }
  #frame { flex:1; border:0; width:100%; background:var(--bg); }
</style>
</head>
<body>
<nav id="side" aria-label="Frontier track navigation"></nav>
<div id="main">
  <div id="bar">
    <button id="prev">&larr; prev</button>
    <div id="now"></div>
    <span id="count"></span>
    <button id="next">next &rarr;</button>
    <a id="ext" target="_blank" rel="noopener" title="open widget alone">open &nearr;</a>
  </div>
  <div id="lesson" hidden></div>
  <iframe id="frame" title="frontier widget"></iframe>
</div>

<script src="../assets/cast.js"></script>
<script>
const NAV = [
  { m:"F1 - Everything becomes a token", items:[
    { label:"The patch stream (photo -> tokens)", src:"module-f1-tokens/widgets/patch-stream/index.html" },
  ]},
];

const LESSONS = {
  "F1 - Everything becomes a token": { q:"The model only reads tokens. How is it suddenly looking at photos and answering with pictures?",
    aha:"The menu grows through two doors. IN: images are cut into patches and PROJECTED into the same vector space as word embeddings (not a menu lookup - attention treats them like any h). OUT: to emit images or speech the menu literally grows - a learned CODEBOOK the model samples autoregressively (for sound, QUANTIZATION snaps each ~20ms frame to its nearest entry). And the names are wiring diagrams, not species: ViT -> CLIP -> VLM (eye + projector + LLM) -> native (seam removed) -> VLA (actions out). Verified as of 2026-07." },
};

const side=document.getElementById("side"), frame=document.getElementById("frame"),
      now=document.getElementById("now"), ext=document.getElementById("ext"),
      prev=document.getElementById("prev"), next=document.getElementById("next"),
      count=document.getElementById("count"), lesson=document.getElementById("lesson");

const flat=[]; NAV.forEach(g=>g.items.forEach(it=>flat.push({...it, module:g.m})));

side.innerHTML =
  '<div class="brand"><span class="chr" data-c="cortex" data-e="reach"></span><span class="bt">Essence of the Frontier<span class="dot">.</span></span></div>' +
  '<a class="homelink" href="../index.html">&larr; all tracks</a>' +
  '<div class="gnote" style="padding:6px 18px">Track 4 - every 2026 headline, mapped to a principle you own. Verified as of 2026-07; exhibits age, the mapping does not. Modules land one by one.</div>' +
  NAV.map(g=>'<div class="group"><div class="gh">'+g.m+'</div>'+
    g.items.map(it=>'<button class="navlink" data-src="'+it.src+'">'+it.label+'</button>').join("")+'</div>').join("") +
  '<a class="tolink" href="../models/index.html"><b>&larr; Inside the Model</b><span class="sub2">the principles these exhibits attack</span></a>' +
  '<a class="tolink" href="../agentic-course/index.html"><b>&larr; The course</b><span class="sub2">the loop it all started from</span></a>';

Cast.render(side);

let curIdx=0;
function load(src){
  const i=flat.findIndex(x=>x.src===src); curIdx=i<0?0:i;
  const item=flat[curIdx];
  frame.src=item.src;
  now.innerHTML='<b class="mod">'+item.module+'</b><span class="lbl">'+item.label+'</span>';
  ext.href=item.src;
  count.textContent=(curIdx+1)+" / "+flat.length;
  location.hash=encodeURIComponent(item.src);
  prev.disabled=curIdx===0; next.disabled=curIdx===flat.length-1;
  document.querySelectorAll(".navlink").forEach(a=>a.classList.toggle("active",a.dataset.src===item.src));
  const L=LESSONS[item.module];
  if(L){ const readme=item.src.includes("/widgets/")?item.src.split("/widgets/")[0]+"/README.md":null;
    lesson.hidden=false;
    lesson.innerHTML='<details><summary><span class="qk">the question</span>'+L.q+'</summary>'+
      '<div class="lbody"><p><b>The idea:</b> '+L.aha+'</p>'+
      (readme?'<a href="'+readme+'" target="_blank" rel="noopener">Read the full written lesson (README) &rarr;</a>':"")+
      '</div></details>';
  } else { lesson.hidden=true; lesson.innerHTML=""; }
}
side.querySelectorAll(".navlink").forEach(a=>a.onclick=()=>load(a.dataset.src));
prev.onclick=()=>{ if(curIdx>0) load(flat[curIdx-1].src); };
next.onclick=()=>{ if(curIdx<flat.length-1) load(flat[curIdx+1].src); };
const initial=location.hash?decodeURIComponent(location.hash.slice(1)):flat[0].src;
load(initial);
</script>
</body>
</html>
