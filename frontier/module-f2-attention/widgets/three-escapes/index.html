<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Attention unchained</title>
<!-- Frontier F2, rebuilt on ONE stage: an actual page, read three ways.
     Margin scores + notebook state computed live; page text + toy vectors
     hand-authored (labeled). Rule 12: the argument is taught, not a winner. -->
<link rel="stylesheet" href="../../../../assets/theme.css" />
<style>
  body { font:16px/1.55 system-ui,-apple-system,Segoe UI,sans-serif; color:var(--ink);
         background:var(--bg); max-width:960px; margin:28px auto; padding:0 20px 60px; }
  h1 { font-family:var(--serif); font-weight:600; font-size:22px; margin:0 0 3px; }
  .stamp { font:10.5px var(--mono); color:var(--faint); letter-spacing:.05em; }
  .sub { color:var(--dim); margin:4px 0 12px; font-size:14px; }
  .sub b { color:var(--ink); }
  .modes { display:flex; align-items:center; gap:8px; margin:0 0 12px; flex-wrap:wrap; }
  .modebtn { font:inherit; font-size:13.5px; border:1px solid var(--line); background:var(--panel);
             color:var(--dim); border-radius:999px; padding:5px 14px; cursor:pointer; }
  .modebtn.on { color:var(--ink); border-color:var(--blue); background:#12171e; }
  .modehint { color:var(--faint); font-size:12.5px; }
  #canvas { border:1px solid var(--line); border-radius:12px; overflow:hidden; background:#0b0e12; line-height:0; }
  #canvas canvas { max-width:100%; height:auto; display:block; }
  .caption { color:#d8dde3; font-size:15px; margin:12px 0 0; min-height:56px; }
  .insight { margin:10px 0 2px; padding:10px 13px; border:1px solid var(--line); border-left:3px solid var(--blue);
             border-radius:8px; background:var(--panel); color:#dfe4ea; font-size:14px; }
  .react { margin-top:10px; }
</style>
</head>
<body>
<h1>Attention unchained</h1>
<div class="stamp">TRACK 4 . F2 . verified as of 2026-07 - one page, read three ways</div>
<p class="sub">One page. One question. <b>Three ways to read</b> - and every 2026 flagship is one of them.</p>

<div class="modes">
  <button class="modebtn on" data-mode="int">intuition (watch the reading)</button>
  <button class="modebtn" data-mode="mech">mechanism (the numbers on the page)</button>
  <span class="modehint">page + toy vectors hand-authored (labeled); scores, notes and meters computed live</span>
</div>

<div id="canvas" aria-label="One page of text being read three different ways"></div>

<div class="caption" id="caption" aria-live="polite"></div>
<div class="insight" id="insight"></div>
<div class="react" id="react"><span class="chr" id="chrR" data-c="cortex" data-e="neutral"></span><span class="line" id="reactLine"></span></div>

<div id="scrub"></div>

<script src="../../../../assets/cast.js"></script>
<script src="../../../../assets/anim.js"></script>
<script src="../../../../assets/vendor/p5.min.js"></script>
<script>
/* ===== the page (hand-authored, labeled) ===== */
const LINES=[
 "Marie left the office at noon.",
 "The sky over the city had turned grey.",
 "She stopped at the little shop on Rue Cler.",
 "She bought a red umbrella there.",
 "The shopkeeper wrapped it with care.",
 "Outside, the wind was picking up.",
 "She thought about the meeting, and Tom.",
 "The rain began as she reached the station."];
const NWORDS=56;                                     // total words on the page
const Q1="Where did Marie buy the umbrella?";
const Q2="What color was it?";
const ANS=["At","the","shop","on","Rue","Cler."];
// per-line 2-D index keys (toy, hand-authored) + the question's index query
const IKEY=[[0.7,0.5],[0.1,0.1],[0.9,0.7],[0.8,0.8],[0.5,0.2],[0.1,0.05],[0.2,0.1],[0.2,0.2]];
const IQ=[0.9,0.6];
const U=IKEY.map(k=>+(IQ[0]*k[0]+IQ[1]*k[1]).toFixed(2));
const TOP3=U.map((u,i)=>[u,i]).sort((a,b)=>b[0]-a[0]).slice(0,3).map(x=>x[1]);
const TOPWORDS=21;                                   // words on the 3 kept lines
// the notebook: 4 slots; per-line notes; overwrites (index -> [slot, newNote])
const NOTES=["Marie, noon","grey sky","shop, Rue Cler","red umbrella"];
const OVER=[[5,1,"wind rising"],[6,0,"meeting, Tom"],[7,3,"rain, station"]]; // line 7 EVICTS "red umbrella"
// linear-state arithmetic (mechanism act 2): S += outer(k,v), toy 2x2
const LKV=[{k:[1,0],v:[2,1]},{k:[0,1],v:[1,3]},{k:[1,1],v:[1,0]}];
function stateAfter(n){ const S=[[0,0],[0,0]];
  for(let t=0;t<n;t++){ const {k,v}=LKV[t]; for(let i=0;i<2;i++) for(let j=0;j<2;j++) S[i][j]+=k[i]*v[j]; } return S; }
const LQ=[1,2];

const $=id=>document.getElementById(id);
const caption=$("caption"), insight=$("insight"), chrR=$("chrR"), reactLine=$("reactLine");
function react(w,e,l){ chrR.dataset.c=w; chrR.dataset.e=e; reactLine.textContent=l; Cast.render($("react")); }

if (window.p5) p5.disableFriendlyErrors=true;
const CW=920, CH=400;
const ease=t=>t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
let MODE="int", STEP=0;

new p5(function(p){
  const density=()=>Math.max(2,window.devicePixelRatio||1);
  let lastKey="", stepStart=0;
  function prog(delay,dur){ return ease(p.constrain((p.frameCount-stepStart-(delay||0))/(dur||40),0,1)); }
  p.setup=function(){ const c=p.createCanvas(CW,CH); c.parent("canvas");
    p.textFont("ui-monospace, Menlo, Consolas, monospace"); p.pixelDensity(density()); };
  p.draw=function(){ if(p.pixelDensity()!==density()) p.pixelDensity(density());
    const key=MODE+STEP; if(key!==lastKey){ lastKey=key; stepStart=p.frameCount; }
    p.background(11,14,18);
    try { (MODE==="int"?drawInt:drawMech)(); }
    catch(e){ // never die silently: paint the error so it can be reported
      p.push(); p.noStroke(); p.fill("#fc6255"); p.textSize(12); p.textAlign(p.LEFT);
      p.text("stage error at "+MODE+" step "+(STEP+1)+": "+String(e).slice(0,90), 40, 60);
      p.text("(please report this line)", 40, 84); p.pop(); } };

  /* the page: opts { dim:[], gold:[], grey, flash, cursor, margins:'u'|null, x,y,w,lh } */
  function page(o){
    const x=o.x||46, y=o.y||86, w=o.w||520, lh=o.lh||26;
    p.push(); p.fill(15,18,23); p.stroke("#2a2f38"); p.rect(x-14,y-34,w,LINES.length*lh+52,10);
    p.noStroke(); p.fill("#98a2b0"); p.textSize(9.5); p.textAlign(p.LEFT); p.text("THE PAGE (56 words)",x,y-16);
    LINES.forEach((t,i)=>{ const ly=y+i*lh;
      const gold=o.gold&&o.gold.indexOf(i)>=0, dim=o.dim&&o.dim.indexOf(i)>=0;
      if(o.flash!=null){ p.fill(88,196,221,o.flash); p.rect(x-6,ly-4,w-16,lh-6,4); }
      if(gold){ p.fill(255,211,92,44); p.rect(x-6,ly-4,w-16,lh-6,4); }
      if(o.cursor===i){ p.fill(131,193,103,50); p.rect(x-6,ly-4,w-16,lh-6,4); }
      p.fill(o.grey||dim ? "#3d4450" : (gold?"#ffd35c":"#b9c0ca")); p.textSize(11);
      p.text(t, x, ly+9);
      if(o.margins&&o.margins[i]!=null){ p.fill(TOP3.indexOf(i)>=0?"#ffd35c":"#5b6470"); p.textSize(9);
        p.text("u="+o.margins[i].toFixed(2), x+w-70, ly+9); }
    });
    p.pop();
  }
  function question(txt,y){ p.push(); p.noStroke(); p.fill("#58c4dd"); p.textSize(11.5); p.textAlign(p.LEFT);
    p.text("Q: "+txt, 46, y||46); p.pop(); }
  function answerRow(nWords,y,wrong){ p.push(); p.noStroke(); p.textAlign(p.LEFT);
    p.fill("#98a2b0"); p.textSize(10); p.text("Cortex writes:", 620, y-18);
    let ax=620; (wrong?["Grey?"]:ANS.slice(0,nWords)).forEach(wd=>{ p.fill(wrong?"#fc6255":"#83c167"); p.textSize(13);
      p.text(wd,ax,y); ax+=p.textWidth(wd)+8; });
    if(wrong){ p.fill("#fc6255"); p.textSize(18); p.text("X", ax+6, y);
      p.fill("#98a2b0"); p.textSize(9.5); p.text("(it was red - the note was evicted)", 620, y+22); }
    p.pop(); }
  function notebook(x,y,slots,flashSlot){ p.push();
    p.fill(15,18,23); p.stroke("#83c167"); p.strokeWeight(1.4); p.rect(x,y,250,128,10);
    p.noStroke(); p.fill("#83c167"); p.textSize(9.5); p.textAlign(p.LEFT); p.text("THE NOTEBOOK (4 slots, fixed)",x+12,y-8);
    slots.forEach((s,i)=>{ const sy=y+14+i*28;
      if(flashSlot===i){ p.fill(252,98,85,70); p.rect(x+8,sy-4,234,22,4); }
      p.fill(23,27,33); p.stroke("#2a3a2c"); p.rect(x+8,sy-4,234,22,4); p.noStroke();
      p.fill(s?"#cdd3da":"#3d4450"); p.textSize(10); p.text(s||"(empty)",x+16,sy+7); });
    p.pop(); }
  function meterBar(label,val,max,unit,y,col){ p.push(); p.noStroke(); p.textAlign(p.LEFT);
    p.fill("#98a2b0"); p.textSize(9.5); p.text(label, 620, y);
    p.fill(col); p.rect(620, y+6, 4+236*(val/max), 10, 3);
    p.fill("#cdd3da"); p.textSize(10); p.text(val+" "+unit, 620, y+30); p.pop(); }
  function stampEx(txt,x,y){ p.push(); p.noStroke(); p.fill(23,27,33); p.stroke("#5b6470");
    p.rect(x,y,p.textWidth(txt)+18,20,10); p.noStroke(); p.fill("#98a2b0"); p.textSize(9.5);
    p.textAlign(p.LEFT); p.text(txt,x+9,y+13); p.pop(); }
  /* 3b1b-style vector panel: axes + arrows; optional projection of vec a onto vec b
     (the shaded gold segment IS the dot product's geometry) */
  function vecPanel(x,y,s,vecs,proj,title){ p.push();
    p.fill(15,18,23); p.stroke("#2a2f38"); p.rect(x,y,s,s,8);
    const cx=x+16, cy=y+s-16, sc=(s-32);
    p.stroke("#1b2028"); for(let g=1;g<=4;g++){ const t=g*sc/4;
      p.line(x+16,cy-t,x+s-16,cy-t); p.line(cx+t,y+16,cx+t,y+s-16); }
    p.stroke("#3a4350"); p.line(cx,cy,x+s-8,cy); p.line(cx,cy,cx,y+8);
    function arrow(v,col,w,lab){ const ex=cx+v[0]*sc, ey=cy-v[1]*sc;
      p.stroke(col); p.strokeWeight(w||2); p.line(cx,cy,ex,ey);
      const a=Math.atan2(cy-ey,ex-cx); p.noStroke(); p.fill(col);
      p.triangle(ex,ey, ex-8*Math.cos(a-0.4), ey+8*Math.sin(a-0.4), ex-8*Math.cos(a+0.4), ey+8*Math.sin(a+0.4));
      if(lab){ p.textSize(9); p.textAlign(p.LEFT); p.text(lab, ex+4, ey-4); } p.stroke(0); }
    if(proj){ const A=vecs[proj.a].v, B=vecs[proj.b].v;
      const t=(A[0]*B[0]+A[1]*B[1])/(B[0]*B[0]+B[1]*B[1]), P=[t*B[0],t*B[1]];
      const px=cx+P[0]*sc, py=cy-P[1]*sc, ax=cx+A[0]*sc, ay=cy-A[1]*sc;
      p.stroke("#5b6470"); p.strokeWeight(1); p.drawingContext.setLineDash([3,3]); p.line(ax,ay,px,py); p.drawingContext.setLineDash([]);
      p.stroke("#ffd35c"); p.strokeWeight(4); p.line(cx,cy,px,py); }
    vecs.forEach(o=>arrow(o.v,o.col,o.w,o.label));
    if(title){ p.noStroke(); p.fill("#98a2b0"); p.textSize(8.5); p.textAlign(p.LEFT); p.text(title,x+8,y+11); }
    p.pop(); }

  /* ---- INTUITION: 7 steps, all on the page ---- */
  function drawInt(){
    const k=STEP;
    question(k===4?Q2:Q1);
    if(k===0){ // FULL: whole page flashes for EVERY output word (loops forever)
      const cyc=(p.frameCount-stepStart)%(ANS.length*50+90);
      const wi=Math.min(Math.floor(cyc/50), ANS.length);
      const flash=cyc%50<16 && wi<ANS.length ? 60 : 0;
      page({flash:flash});
      answerRow(wi,120);
      meterBar("page reads PER WORD written", NWORDS, NWORDS, "words re-read, every time", 170, "#fc6255");
      stampEx("full attention - M2/M3, unchanged", 620, 230);
    }
    if(k===1){ // SPARSE skim: spotlight stamps margin scores
      const seen=Math.floor(prog(0,110)*8);
      page({margins:U.map((u,i)=>i<seen?u:null), cursor:Math.min(seen,7)});
      p.push(); p.noStroke(); p.fill("#ffd35c"); p.textSize(10.5); p.textAlign(p.LEFT);
      p.text("a cheap INDEXER skims once,", 620, 110); p.text("scoring every line (live)", 620, 126); p.pop();
    }
    if(k===2){ // SPARSE read: 3 gold lines, rest dim
      const wi=Math.min(Math.floor((p.frameCount-stepStart)/45), ANS.length);
      page({gold:TOP3, dim:LINES.map((_,i)=>i).filter(i=>TOP3.indexOf(i)<0), margins:U});
      answerRow(wi,120);
      meterBar("page reads PER WORD written", TOPWORDS, NWORDS, "of 56 - only the gold lines", 170, "#ffd35c");
      stampEx("this move = DSA . Sep 25 (top-2048 of 131,072)", 620, 230);
    }
    if(k===3){ // LINEAR: read once -> notes; overwrites (loops with a hold)
      const cyc=(p.frameCount-stepStart)%(8*38+150);
      const ln=Math.min(Math.floor(cyc/38), 8);
      const slots=[null,null,null,null]; let flash=null;
      for(let i=0;i<ln;i++){ if(i<4) slots[i]=NOTES[i];
        else { const ov=OVER.find(o=>o[0]===i); if(ov){ slots[ov[1]]=ov[2]; if(i===ln-1) flash=ov[1]; } } }
      page({cursor:ln<8?ln:null, grey:ln>=8});
      notebook(640,110,slots,flash);
      if(ln>=8){ p.push(); p.noStroke(); p.fill("#fc6255"); p.textSize(9.5); p.textAlign(p.LEFT);
        p.text('"red umbrella" was EVICTED', 640, 268); p.pop(); }
      meterBar("kept", 4, 56, "notes - the page is discarded", 290, "#83c167");
    }
    if(k===4){ // THE BREAK: Q2 unanswerable
      page({grey:true});
      notebook(640,110,["meeting, Tom","wind rising","shop, Rue Cler","rain, station"],null);
      answerRow(0,300,true);
      stampEx("MiniMax M2 went BACK to full . Oct 25", 620, 340);
    }
    if(k===5||k===6){ // receipts: three mini-pages (stay on stage for the aha)
      const cols=[["FULL",56,"#fc6255","every line, every word","no regression - full price"],
                  ["SPARSE",21,"#ffd35c","3 gold lines","needs an indexer"],
                  ["LINEAR",4,"#83c167","notebook only","forgets - can break"]];
      cols.forEach((c,i)=>{ const x=60+i*292, pr=(k===6?0.5:prog(i*10,26));
        p.push(); p.drawingContext.globalAlpha=pr;
        p.fill(15,18,23); p.stroke(c[2]); p.rect(x,70,255,220,10); p.noStroke();
        p.fill(c[2]); p.textSize(12); p.textAlign(p.CENTER); p.text(c[0],x+127,94);
        for(let l=0;l<8;l++){ const ly=112+l*16;
          const gold=(i===1&&TOP3.indexOf(l)>=0);
          p.fill(i===0?"rgba(88,196,221,.35)":(gold?"rgba(255,211,92,.5)":(i===2?"#20242c":"#2a3038")));
          p.rect(x+18,ly,220,9,3); }
        p.fill(c[2]); p.rect(x+18,252,10+200*(c[1]/56),9,3);
        p.fill("#cdd3da"); p.textSize(9.5); p.textAlign(p.LEFT); p.text(c[1]+" words/word . "+c[3],x+18,275);
        p.fill("#98a2b0"); p.text(c[4],x+18,289);
        p.drawingContext.globalAlpha=1; p.pop(); });
    }
    if(k===6){ p.push(); p.noStroke(); p.fill("#e9ebee"); p.textSize(12.5); p.textAlign(p.CENTER);
      p.text("same page, same question - three prices, three risks.", CW/2, 330);
      p.text("2026 split exactly this way: full (M2) . sparse (DeepSeek) . linear (Qwen3.5)", CW/2, 352); p.pop(); }
  }

  /* ---- MECHANISM: 14 steps, 3 acts - open EVERYTHING ---- */
  function drawMech(){
    const k=STEP;
    if(k<=4){ // ACT 1: the indexer, opened
      question(Q1);
      if(k===0){ // the keys, AS VECTORS - every line is an arrow
        page({margins:null, w:430, lh:22, y:86});
        p.push(); p.noStroke(); p.textAlign(p.LEFT); p.textSize(8.5); p.fill("#5b6470");
        LINES.forEach((_,i)=> p.text("["+IKEY[i].join(",")+"]", 400, 86+i*22+9)); p.pop();
        vecPanel(560,86,190,
          IKEY.map((v,i)=>({v:v,col:TOP3.indexOf(i)>=0?"#ffd35c":"#3d4450",w:TOP3.indexOf(i)>=0?2:1.2,label:TOP3.indexOf(i)>=0?"L"+i:null}))
            .concat([{v:IQ,col:"#58c4dd",w:2.6,label:"q*"}]),
          null, "every line's key, as an ARROW");
        p.push(); p.noStroke(); p.textAlign(p.LEFT); p.fill("#58c4dd"); p.textSize(10.5);
        p.text("the question is an arrow too: q*", 770, 110);
        p.fill("#cdd3da"); p.text("relevant lines POINT", 770, 140);
        p.text("the same way as q*", 770, 156);
        p.fill("#98a2b0"); p.textSize(9);
        p.text("keys are LEARNED (DSA", 770, 190);
        p.text("distills them); ours toy,", 770, 204);
        p.text("labeled", 770, 218); p.pop(); }
      if(k===1){ // ONE score opened - arithmetic AND geometry (projection)
        page({gold:[3], dim:[5], margins:{3:U[3],5:U[5]}, w:430, lh:22, y:86});
        p.push(); p.noStroke(); p.textAlign(p.LEFT);
        p.fill("#ffd35c"); p.textSize(10.5);
        p.text("u3 = 0.9x0.8 + 0.6x0.8 = "+U[3].toFixed(2), 560, 100);
        p.fill("#5b6470");
        p.text("u5 = 0.9x0.1 + 0.6x0.05 = "+U[5].toFixed(2), 560, 122);
        p.pop();
        vecPanel(560,140,190,
          [{v:IKEY[3],col:"#ffd35c",w:2.4,label:"k3"},{v:IKEY[5],col:"#3d4450",w:1.4,label:"k5"},{v:IQ,col:"#58c4dd",w:2.6,label:"q*"}],
          {a:0,b:2}, "the score IS the shadow: k3 projected onto q*");
        p.push(); p.noStroke(); p.textAlign(p.LEFT);
        p.fill("#ffd35c"); p.textSize(10.5);
        p.text("k3 points WITH q* -> long", 770, 170);
        p.text("gold shadow = big score", 770, 186);
        p.fill("#5b6470"); p.text("k5 barely points along q*", 770, 216);
        p.text("-> tiny shadow, tiny score", 770, 232);
        p.fill("#58c4dd"); p.textSize(10);
        p.text("the indexer IS a tiny", 770, 268);
        p.text("attention: rank by alignment", 770, 284); p.pop(); }
      if(k===2){ const seen=Math.floor(prog(0,100)*8);
        page({margins:U.map((u,i)=>i<seen?u:null), cursor:Math.min(seen,7)});
        p.push(); p.noStroke(); p.textAlign(p.LEFT); p.fill("#ffd35c"); p.textSize(10.5);
        p.text("all 8, same arithmetic, computed", 620, 110);
        p.text("live - cheap because the vectors are", 620, 126);
        p.text("tiny and low-precision (FP8)", 620, 142); p.pop(); }
      if(k===3){ page({gold:TOP3, dim:LINES.map((_,i)=>i).filter(i=>TOP3.indexOf(i)<0), margins:U});
        meterBar("exact attention now reads", TOPWORDS, NWORDS, "words of 56 (~2,048 of 131,072 at scale)", 120, "#ffd35c"); }
      if(k===4){ page({gold:TOP3, dim:LINES.map((_,i)=>i).filter(i=>TOP3.indexOf(i)<0)});
        const TL=[["NSA","Feb 25"],["DSA","Sep 25"],["GLM-5","Feb 26"],["V4","Jun 26"],["MSA","Jun 26"]];
        p.push(); p.stroke("#3a4350"); p.line(630,140,890,140);
        TL.forEach((d,i)=>{ const x=644+i*58; p.noStroke(); p.fill(i===3?"#ffd35c":"#58c4dd"); p.circle(x,140,7);
          p.textAlign(p.CENTER); p.textSize(8.5); p.fill("#cdd3da"); p.text(d[0],x,124); p.fill("#5b6470"); p.text(d[1],x,158); p.stroke(0); });
        p.noStroke(); p.fill("#ffd35c"); p.textSize(9); p.textAlign(p.CENTER); p.text("V4: 27% FLOPs . 10% KV",760,180);
        p.fill("#fc6255"); p.textSize(9.5); p.text("new bottleneck: the indexer -> IndexShare (2.9x)",760,204); p.pop(); }
    } else if(k<=10){ // ACT 2: the notebook, opened
      const k2=k-5;
      question(Q1);
      if(k2===0){ // the reveal: words were the metaphor, S is the machine
        notebook(80,100,NOTES,null);
        p.push(); p.stroke("#3a4350"); p.strokeWeight(1.6); p.line(345,164,420,164); p.noStroke();
        p.fill("#3a4350"); p.triangle(420,158,420,170,430,164);
        p.fill("#83c167"); p.textSize(12); p.textAlign(p.LEFT);
        p.text("S = [ 0  0 ]", 460, 152); p.text("    [ 0  0 ]", 460, 174);
        p.fill("#e9ebee"); p.textSize(11);
        p.text("the words were the METAPHOR.", 640, 140);
        p.text("the machine is a fixed matrix S -", 640, 158);
        p.text("notes are smeared into numbers.", 640, 176); p.pop(); }
      if(k2===1){ // one fold, all four cells expanded
        page({cursor:0, y:86, lh:22, w:430});
        p.push(); p.noStroke(); p.textAlign(p.LEFT); p.fill("#cdd3da"); p.textSize(11);
        p.text("line 1 -> k=[1,0]  v=[2,1]", 560, 100);
        p.fill("#83c167");
        p.text("S += k x v^T, every cell:", 560, 126);
        p.text("S00 += 1x2 = 2    S01 += 1x1 = 1", 580, 150);
        p.text("S10 += 0x2 = 0    S11 += 0x1 = 0", 580, 172);
        p.fill("#e9ebee"); p.text("S = [ 2  1 ]   [ 0  0 ]", 580, 200);
        p.fill("#98a2b0"); p.textSize(9.5);

document.querySelectorAll(".modebtn").forEach(b=>b.onclick=()=>{
