<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Essence of Serving</title>
<link rel="stylesheet" href="../assets/theme.css" />
<style>
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--ink); font:15px/1.55 system-ui,-apple-system,Segoe UI,sans-serif;
         display:flex; min-height:100vh; }
  #side { width:280px; min-width:280px; border-right:1px solid var(--line); background:#0d1014;
          overflow-y:auto; padding-bottom:24px; }
  .brand { display:flex; align-items:center; gap:10px; padding:16px 18px 8px; }
  .brand .chr svg { width:34px; height:34px; }
  .bt { font-family:var(--serif); font-weight:600; font-size:17px; }
  .dot { color:var(--green); }
  .homelink { display:block; padding:2px 18px 8px; color:var(--dim); font-size:12.5px; text-decoration:none; }
  .homelink:hover { color:var(--ink); }
  .gnote { color:var(--faint); font-size:11.5px; line-height:1.5; }
  .group { margin-top:10px; }
  .gh { font:10.5px var(--mono); text-transform:uppercase; letter-spacing:.08em; color:var(--faint); padding:6px 18px 4px; }
  .navlink { display:block; width:100%; text-align:left; font:inherit; font-size:13.5px; color:var(--dim);
             background:none; border:0; border-left:2px solid transparent; padding:7px 18px; cursor:pointer; }
  .navlink:hover { color:var(--ink); background:#12161c; }
  .navlink.active { color:var(--ink); border-left-color:var(--green); background:#12171e; }
  .tolink { display:block; padding:10px 18px; margin-top:14px; border-top:1px solid var(--line);
            color:var(--dim); font-size:12.5px; text-decoration:none; }
  .tolink b { color:var(--ink); display:block; }
  .tolink:hover b { color:var(--green); }
  .tolink .sub2 { font-size:11px; color:var(--faint); }

  #main { flex:1; display:flex; flex-direction:column; min-width:0; }
  #bar { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid var(--line); background:#0d1014; }
  #bar button { font:inherit; font-size:12.5px; border:1px solid var(--line); background:var(--panel); color:var(--dim);
                border-radius:8px; padding:5px 12px; cursor:pointer; }
  #bar button:hover:not(:disabled) { color:var(--ink); }
  #bar button:disabled { opacity:.35; cursor:default; }
  #now { flex:1; min-width:0; font-size:13px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #now .mod { color:var(--green); font:11px var(--mono); margin-right:8px; }
  #count { font:11px var(--mono); color:var(--faint); }
  #ext { font-size:12px; color:var(--faint); text-decoration:none; }
  #ext:hover { color:var(--ink); }
  #lesson { border-bottom:1px solid var(--line); background:#0e1116; padding:0 16px; }
  #lesson details { padding:9px 0; }
  #lesson summary { cursor:pointer; list-style:none; font-size:13px; color:var(--dim); }
  #lesson summary .qk { font:10px var(--mono); text-transform:uppercase; letter-spacing:.07em; color:var(--green); margin-right:8px; }
  #lesson .lbody { padding:8px 2px 4px; font-size:13.5px; color:#d3d8de; max-width:900px; }
  #lesson a { color:var(--blue); }
  #frame { flex:1; border:0; width:100%; background:var(--bg); }
</style>
</head>
<body>
<nav id="side" aria-label="Serving track navigation"></nav>
<div id="main">
  <div id="bar">
    <button id="prev">&larr; prev</button>
    <div id="now"></div>
    <span id="count"></span>
    <button id="next">next &rarr;</button>
    <a id="ext" target="_blank" rel="noopener" title="open widget alone">open &nearr;</a>
  </div>
  <div id="lesson" hidden></div>
  <iframe id="frame" title="serving widget"></iframe>
</div>

<script src="../assets/cast.js"></script>
<script>
const NAV = [
  { m:"S0 - The hosting problem", items:[
    { label:"The doorway (bandwidth is the clock)", src:"module-s0-hosting-problem/widgets/hosting-problem/index.html" } ]},
  { m:"S1 - Read the real engine", items:[
    { label:"run.c, synced to the data (real model)", src:"module-s1-read-the-engine/widgets/read-the-engine/index.html" } ]},
  { m:"S2 - Make it fast", items:[
    { label:"Shrink the pile, work the floor", src:"module-s2-fast/widgets/fast/index.html" } ]},
  { m:"S3 - Ship it", items:[
    { label:"One file, every OS (llamafile)", src:"module-s3-ship-it/widgets/ship-it/index.html" } ]},
  { m:"S4 - Run it in the browser", items:[
    { label:"A real model, no server (WebGPU)", src:"module-s4-browser/widgets/browser/index.html" } ]},
  { m:"S5 - Serve many", items:[
    { label:"The griddle + the locker wall", src:"module-s5-serve-many/widgets/serve-many/index.html" } ]},
  { m:"S6 - The fleet & the bill", items:[
    { label:"Throughput vs latency vs cost", src:"module-s6-fleet-bill/widgets/fleet-bill/index.html" } ]},
  { m:"S7 - Host it yourself (capstone)", items:[
    { label:"Design, run a real model, price a fleet", src:"module-s7-capstone/widgets/host-it-yourself/index.html" } ]},
];

const LESSONS = {
  "S0 - The hosting problem": { q:"Your Track-1 agent called a model thousands of times. Why is each call slow, and why does it cost what it costs?",
    aha:"A forward pass must read EVERY weight from memory into compute, so speed is set by the memory doorway (bandwidth), not the math: bytes/token = params x bits/8, and tok/s = bandwidth/bytes. The compute unit finishes the instant the bytes arrive and then idles - 'memory-bound', which nearly all decoding is. And where a model can LIVE (cloud/laptop/phone/browser) is a bandwidth question. Every trick in this track is one move on this picture: shrink the pile (S2), widen/better-use the doorway (S2), or serve many tokens per trip (S5). Verified as of 2026-07." },
  "S1 - Read the real engine": { q:"When your agent gets a token back, what code actually ran? And what one thing turns a toy into a server?",
    aha:"An inference engine is M0's loop + M2's attention + M3's cache, in ~15 lines of C. The widget runs the course's REAL nanomodel (~1,130 weights, trained on 'the capital of france is paris') live: the source lights up as a token flows through it, every number computed. The one line that makes it a server is the KV cache - cache_k[pos]=k - which stores each token's k,v once and reuses them, turning per-token cost from O(n) to O(1). Verified as of 2026-07." },
  "S2 - Make it fast": { q:"With fixed hardware, what makes a served model faster - and where does the time actually go?",
    aha:"Two levers on tok/s = bandwidth/bytes. QUANTIZE (fewer bits) shrinks the pile: int4 is ~4x smaller and ~4x faster, usually with no quality you'd notice (M8), until precision falls off a cliff below ~4 bits; the KV cache quantizes too. THE KERNEL works the compute floor: the matmul filled one cell at a time (scalar), a row at a time (SIMD - AVX/NEON/WASM), or the whole floor at once (GPU/WebGPU); flash-attention fuses it to move less memory. Verified as of 2026-07." },
  "S3 - Ship it": { q:"How do you ship a model so anyone runs it - no Python, no CUDA, no setup?",
    aha:"Fold the engine (llama.cpp) and the weights (GGUF) into ONE file that Cosmopolitan Libc compiles to an APE - simultaneously a valid Windows .exe, Linux ELF, macOS Mach-O, and shell script. Copy it, run it: that is the whole install, GPU if present, CPU SIMD if not. And it serves the ANTHROPIC Messages API on localhost, so your Track-1 agent (Claude Code) points at the local file and runs fully offline. Hosting collapsed to one portable, private, API-compatible file. Verified as of 2026-07." },
  "S4 - Run it in the browser": { q:"Can a real model run with zero install and zero server - inside a browser tab?",
    aha:"Yes. WebGPU gives the browser real GPU compute (S2's floor), and transformers.js/WebLLM run a real quantized model client-side - downloaded once, cached, then offline, private, keyless. Being the most restricted host makes every cost visible: the download size is S2's bytes, the measured tok/s is S0's clock, what fits is S0's 'fits and flows'. The widget's panel runs a real model on your machine (WebGPU, WASM fallback). Verified as of 2026-07." },
  "S5 - Serve many": { q:"One tab serves one user. How does a datacenter serve thousands on the SAME GPU?",
    aha:"Packing. Batching amortizes S0's doorway - read the weights once per step, serve the whole batch. STATIC batching wastes it (finished slots idle until the batch clears); CONTINUOUS batching refills every step so the GPU never idles - the biggest serving win (vLLM/SGLang). Then memory is the limit: PagedAttention breaks the KV cache into fixed pages handed out on demand (no fragmentation), and shared prefixes store a common prompt once (M3's prompt cache, at fleet scale). Verified as of 2026-07." },
  "S6 - The fleet & the bill": { q:"What does it actually COST to serve your agent to a crowd, and what are the knobs?",
    aha:"A fleet is replicas behind a queue, priced by GPU-hours whether busy or idle, autoscaled against a spiky demand curve (cold starts lag; reserved vs spot trades price for reliability). Users feel two latencies: TTFT (prefill, compute-bound) and TPOT (decode, memory-bound), so fleets disaggregate the two. It all rolls to $/1M tokens = GPU-hours x price / tokens - which is your agent's bill, and every S-module is a lever on the throughput/latency/cost triangle. Verified as of 2026-07." },
  "S7 - Host it yourself (capstone)": { q:"Can you take one design all the way - a real model running, and a fleet priced from what it really does?",
    aha:"The whole track as a console: DESIGN with the dials you learned (model size and bits = S2's pile; backend = S2/S4's kernel; deployment = S5's batching), RUN the course's real nanomodel live and timed on YOUR machine (rule 13's honest single-instance measurement), SCALE to a fleet with tokens/day, GPUs, and cost/day projected (S6), and SETTLE beside the real 2026 stack you just described - WebLLM (S4), llamafile (S3), or vLLM (S5-S6). Read it, make it fast, ship it, run it, rack it - and price it. Verified as of 2026-07." },
};

const side=document.getElementById("side"), frame=document.getElementById("frame"),
      now=document.getElementById("now"), ext=document.getElementById("ext"),
      prev=document.getElementById("prev"), next=document.getElementById("next"),
      count=document.getElementById("count"), lesson=document.getElementById("lesson");

const flat=[]; NAV.forEach(g=>g.items.forEach(it=>flat.push({...it, module:g.m})));

side.innerHTML =
  '<div class="brand"><span class="chr" data-c="bit" data-e="happy"></span><span class="bt">Essence of Serving<span class="dot">.</span></span></div>' +
  '<a class="homelink" href="../index.html">&larr; all tracks</a>' +
  '<div class="gnote" style="padding:6px 18px">Track 5 - hosting a model for real: read it, make it fast, ship it, run it, rack it. The one number under it all is $/1M tokens - your agent\'s bill. Verified as of 2026-07. All eight modules are live.</div>' +
  NAV.map(g=>'<div class="group"><div class="gh">'+g.m+'</div>'+
    g.items.map(it=>'<button class="navlink" data-src="'+it.src+'">'+it.label+'</button>').join("")+'</div>').join("") +
  '<a class="tolink" href="../frontier/index.html"><b>&larr; Essence of the Frontier</b><span class="sub2">the models this track serves</span></a>' +
  '<a class="tolink" href="../models/index.html"><b>&larr; Inside the Model</b><span class="sub2">M3\'s KV cache, S1\'s engine</span></a>';

Cast.render(side);

let curIdx=0;
function load(src){
  const i=flat.findIndex(x=>x.src===src); curIdx=i<0?0:i;
  const item=flat[curIdx];
  frame.src=item.src;
  now.innerHTML='<b class="mod">'+item.module+'</b><span class="lbl">'+item.label+'</span>';
  ext.href=item.src;
  count.textContent=(curIdx+1)+" / "+flat.length;
  location.hash=encodeURIComponent(item.src);
  prev.disabled=curIdx===0; next.disabled=curIdx===flat.length-1;
  document.querySelectorAll(".navlink").forEach(a=>a.classList.toggle("active",a.dataset.src===item.src));
  const L=LESSONS[item.module];
  if(L){ const readme=item.src.includes("/widgets/")?item.src.split("/widgets/")[0]+"/README.md":null;
    lesson.hidden=false;
    lesson.innerHTML='<details><summary><span class="qk">the question</span>'+L.q+'</summary>'+
      '<div class="lbody"><p><b>The idea:</b> '+L.aha+'</p>'+
      (readme?'<a href="'+readme+'" target="_blank" rel="noopener">Read the full written lesson (README) &rarr;</a>':"")+
      '</div></details>';
  } else { lesson.hidden=true; lesson.innerHTML=""; }
}
side.querySelectorAll(".navlink").forEach(a=>a.onclick=()=>load(a.dataset.src));
prev.onclick=()=>{ if(curIdx>0) load(flat[curIdx-1].src); };
next.onclick=()=>{ if(curIdx<flat.length-1) load(flat[curIdx+1].src); };
const initial=location.hash?decodeURIComponent(location.hash.slice(1)):flat[0].src;
load(initial);
</script>
</body>
</html>
