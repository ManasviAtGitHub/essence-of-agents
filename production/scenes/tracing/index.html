<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>See inside the black box</title>
<link rel="stylesheet" href="../../../assets/theme.css" />
<style>
  body { font:16px/1.55 system-ui,-apple-system,Segoe UI,sans-serif; color:var(--ink);
         background:var(--bg); max-width:820px; margin:34px auto; padding:0 20px 60px; }
  h1 { font-family:var(--serif); font-weight:600; font-size:22px; margin:0 0 4px; }
  .sub { color:var(--dim); margin:0 0 16px; }

  .scene { display:flex; gap:18px; align-items:flex-start; }
  .who { flex:none; width:118px; display:flex; flex-direction:column; align-items:center; gap:6px; padding-top:22px; }
  .who .chr svg { width:86px; height:86px; }
  .who .note { color:var(--dim); font-size:12px; text-align:center; }

  .box { flex:1; min-width:0; border:1px solid var(--line); border-radius:12px; background:#0b0e12; padding:14px; }

  .io { display:flex; gap:10px; align-items:baseline; font-size:13px; padding:8px 11px; border-radius:8px;
        background:var(--panel); border-left:3px solid var(--gold); }
  .io .tag { font:10px var(--mono); text-transform:uppercase; letter-spacing:.06em; color:var(--faint); min-width:34px; }
  .io .txt { font-family:var(--mono); color:#cdd3da; }
  .io.out { border-left-color:var(--blue); margin-top:12px; }
  .io.out.bad { border-left-color:var(--red); }
  .io .flag { margin-left:auto; color:var(--red); font:11px var(--mono); }

  .body { margin-top:12px; min-height:150px; }

  /* OFF: the literal black box */
  .blackbox { border:1px solid #000; background:#000; border-radius:10px; min-height:150px; display:flex;
              flex-direction:column; align-items:center; justify-content:center; gap:12px; }
  .blackbox .lab { color:#3d444d; font:11px var(--mono); text-transform:uppercase; letter-spacing:.16em; }
  .blocks { display:flex; gap:7px; height:14px; }
  .hblk { width:28px; height:12px; border-radius:3px; background:#181c22; }
  .hblk.new { animation:pop .3s ease; }
  @keyframes pop { from { transform:scaleX(.2); opacity:0; } to { transform:none; opacity:1; } }

  /* ON: the trace timeline */
  .trace { display:flex; flex-direction:column; gap:7px; }
  .trow { display:flex; gap:12px; align-items:baseline; padding:7px 11px; border-radius:8px; background:var(--panel);
          border-left:3px solid var(--line); font-size:13px; }
  .trow .k { font:10px var(--mono); text-transform:uppercase; letter-spacing:.06em; min-width:92px; color:var(--faint); }
  .trow .d { font-family:var(--mono); color:#cdd3da; }
  .trow.model  { border-left-color:var(--blue); }  .trow.model .k  { color:var(--blue); }
  .trow.tool   { border-left-color:var(--gold); }  .trow.tool .k   { color:var(--gold); }
  .trow.result { border-left-color:var(--green); } .trow.result .k { color:var(--green); }
  .trow.new { animation:slidein .3s ease; }
  @keyframes slidein { from { transform:translateY(9px); opacity:0; } to { transform:none; opacity:1; } }
  .reduce .hblk.new, .reduce .trow.new { animation:none; }

  .metrics { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; }
  .metric { flex:1; min-width:88px; border:1px solid var(--line); border-radius:8px; background:var(--panel); padding:8px 11px; }
  .metric .mv { font:16px var(--mono); color:var(--green); }
  .metric .mk { font:10px var(--mono); text-transform:uppercase; letter-spacing:.06em; color:var(--faint); }

  .banner { margin-top:14px; padding:10px 13px; border-radius:8px; font-size:13.5px; }
  .banner.bad  { border:1px dashed var(--red); color:var(--red); }
  .banner.good { border:1px dashed var(--green); color:var(--green); }

  .modes { display:flex; align-items:center; gap:8px; margin:16px 0 2px; flex-wrap:wrap; }
  .modebtn { font:inherit; font-size:13.5px; border:1px solid var(--line); background:var(--panel);
             color:var(--dim); border-radius:999px; padding:5px 14px; cursor:pointer; }
  .modebtn.on { color:var(--ink); border-color:var(--red); background:#12171e; }
  .modebtn[data-mode="on"].on { border-color:var(--green); }
  .modehint { color:var(--faint); font-size:12.5px; }

  .caption { color:#d8dde3; font-size:15px; margin:12px 0 0; }
  .insight { margin:10px 0 2px; padding:10px 13px; border:1px solid var(--line); border-left:3px solid var(--blue);
             border-radius:8px; background:var(--panel); color:#dfe4ea; font-size:14px; }

  @media (max-width:640px) {
    .scene { flex-direction:column; }
    .who { width:100%; flex-direction:row; justify-content:flex-start; padding-top:0; }
    .who .chr svg { width:64px; height:64px; }
    .box { width:auto; }
    .trow .k { min-width:80px; }
  }
</style>
</head>
<body>
<h1>See inside the black box</h1>
<p class="sub">A bad answer with no record is impossible to debug. Watch the same agent run
with tracing <b>off</b>, then <b>on</b> &mdash; and see a black box become a timeline.</p>

<div class="scene" id="scene" role="group" aria-label="Agent run with tracing off versus on">
  <div class="who"><span class="chr" id="bitChr" data-c="bit" data-e="neutral"></span>
    <span class="note" id="note">you &mdash; debugging the agent</span></div>
  <div class="box" id="box"></div>
</div>

<div class="modes">
  <button class="modebtn on" data-mode="off">Tracing OFF (naive)</button>
  <button class="modebtn" data-mode="on">Tracing ON (fixed)</button>
  <span class="modehint">record every step, or fly blind &mdash; switch and re-step to compare</span>
</div>

<div class="caption" id="caption" aria-live="polite"></div>
<div class="insight" id="insight"></div>

<div id="scrub"></div>

<script src="../../../assets/cast.js"></script>
<script src="../../../assets/anim.js"></script>
<script>
// One agent run, six scrubbable steps. EVENTS[0]=input, [1..3]=internal, [4]=answer.
const EVENTS = [
  { k:"in",     lbl:"input",        txt:'ask: "What is our refund window?"' },
  { k:"model",  lbl:"model.call",   txt:"send prompt (system + user)" },
  { k:"tool",   lbl:"tool.call",    txt:'search_policy(q="refund window")' },
  { k:"result", lbl:"tool.result",  txt:'"returns accepted within 30 days"' },
  { k:"answer", lbl:"model.answer", txt:'"You have 45 days to return."' },
];
const STEPS = 6;

const CAP = {
  off: [
    "You ask a question. It goes into the agent.",
    "The agent works &mdash; but you cannot see inside. It is a black box.",
    "Still opaque. A model call? A tool call? No idea.",
    "Whatever it did, none of it was recorded.",
    "An answer comes out: \"45 days\". It looks off &mdash; the real policy is 30.",
    "Why 45? With no record of the steps, tools, or args, you are stuck.",
  ],
  on: [
    "You ask a question. Tracing is on, so every step is recorded.",
    "Step lights up: the model call.",
    "Next step: the tool call, with its args.",
    "Next: the tool result comes back &mdash; 30 days.",
    "The answer comes out: \"45 days\" &mdash; and it still looks off.",
    "But now you have the trace: steps, tokens, cost, latency &mdash; and the bug.",
  ],
};

const esc = s => (s + "").replace(/[&<>]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;" }[c]));
const $ = id => document.getElementById(id);
const box = $("box"), caption = $("caption"), insight = $("insight"), bitChr = $("bitChr"), note = $("note");
const state = { mode: "off" };
if (Anim.reduced()) document.body.classList.add("reduce");

const AHA = "You can't fix what you can't see. Record every step &mdash; tools, args, tokens, cost, "
          + "latency &mdash; and a black box becomes a timeline you can debug.";

function ioRow(cls, tag, txt, flag) {
  return `<div class="io ${cls}"><span class="tag">${tag}</span><span class="txt">${esc(txt)}</span>`
       + (flag ? `<span class="flag">! suspicious</span>` : "") + `</div>`;
}

function renderStep(i, dir) {
  const mode = state.mode;
  const fresh = dir > 0 && !Anim.reduced();
  let html = ioRow("in", "in", EVENTS[0].txt, false);

  if (mode === "off") {
    const blocks = Math.min(Math.max(i, 0), 3);   // hidden activity: 0..3 blocks
    let bl = "";
    for (let b = 0; b < blocks; b++) bl += `<span class="hblk${fresh && b === blocks - 1 ? " new" : ""}"></span>`;
    html += `<div class="body"><div class="blackbox"><div class="lab">agent run &mdash; opaque</div>`
          + `<div class="blocks">${bl}</div><div class="lab">no visibility inside</div></div></div>`;
  } else {
    const upto = Math.min(i, 3);
    let rows = "";
    for (let e = 1; e <= upto; e++) {
      const ev = EVENTS[e];
      rows += `<div class="trow ${ev.k}${fresh && e === upto ? " new" : ""}">`
            + `<span class="k">${ev.lbl}</span><span class="d">${esc(ev.txt)}</span></div>`;
    }
    html += `<div class="body"><div class="trace">${rows || '<div class="trow"><span class="k">trace</span><span class="d">recording...</span></div>'}</div></div>`;
  }

  if (i >= 4) html += ioRow("out bad", "out", EVENTS[4].txt, true);

  if (i >= 5) {
    if (mode === "off") {
      html += `<div class="banner bad">x no record kept &mdash; un-debuggable. You cannot tell why 45 came out.</div>`;
    } else {
      html += `<div class="metrics">`
            + `<div class="metric"><div class="mv">4</div><div class="mk">steps</div></div>`
            + `<div class="metric"><div class="mv">512</div><div class="mk">tokens</div></div>`
            + `<div class="metric"><div class="mv">$0.004</div><div class="mk">cost</div></div>`
            + `<div class="metric"><div class="mv">1240 ms</div><div class="mk">latency</div></div>`
            + `</div>`
            + `<div class="banner good">ok found it: the tool returned <b>30 days</b>, the model answered <b>45</b>. There is your bug.</div>`;
    }
  }
  box.innerHTML = html;

  const moods = mode === "off" ? ["neutral","think","think","think","confused","confused"]
                               : ["neutral","think","think","think","think","happy"];
  bitChr.dataset.e = moods[i]; Cast.render(bitChr.parentElement);
  note.textContent = mode === "off"
    ? (i >= 5 ? "\"why 45? no idea.\"" : "you - flying blind")
    : (i >= 5 ? "\"tool said 30, model said 45.\"" : "you - reading the trace");

  caption.innerHTML = CAP[mode][i];
  insight.innerHTML = i >= 5 ? AHA
    : "A <b>trace</b> is a record of every step the agent took &mdash; the raw material for debugging.";
}

const tl = new Anim.Timeline({ length: STEPS, onStep: renderStep, autoMs: 1300 });
Anim.scrubber($("scrub"), tl, { label: i => "step " + (i + 1) + " / " + STEPS });

document.querySelectorAll(".modebtn").forEach(b => b.onclick = () => {
  state.mode = b.dataset.mode;
  document.querySelectorAll(".modebtn").forEach(x => x.classList.toggle("on", x === b));
  tl.render(0);
});

tl.render(0);
</script>
</body>
</html>
