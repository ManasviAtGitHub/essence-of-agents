<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Workshop</title>
<link rel="stylesheet" href="../assets/theme.css" />
<style>
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--ink); font:15px/1.55 system-ui,-apple-system,Segoe UI,sans-serif;
         display:flex; min-height:100vh; }
  #side { width:280px; min-width:280px; border-right:1px solid var(--line); background:#0d1014;
          overflow-y:auto; padding-bottom:24px; }
  .brand { display:flex; align-items:center; gap:10px; padding:16px 18px 8px; }
  .brand .chr svg { width:34px; height:34px; }
  .bt { font-family:var(--serif); font-weight:600; font-size:17px; }
  .dot { color:#b79cff; }
  .homelink { display:block; padding:2px 18px 8px; color:var(--dim); font-size:12.5px; text-decoration:none; }
  .homelink:hover { color:var(--ink); }
  .gnote { color:var(--faint); font-size:11.5px; line-height:1.5; }
  .group { margin-top:10px; }
  .gh { font:10.5px var(--mono); text-transform:uppercase; letter-spacing:.08em; color:var(--faint); padding:6px 18px 4px; }
  .navlink { display:block; width:100%; text-align:left; font:inherit; font-size:13.5px; color:var(--dim);
             background:none; border:0; border-left:2px solid transparent; padding:7px 18px; cursor:pointer; }
  .navlink:hover { color:var(--ink); background:#12161c; }
  .navlink.active { color:var(--ink); border-left-color:#b79cff; background:#12171e; }
  .tolink { display:block; padding:10px 18px; margin-top:14px; border-top:1px solid var(--line);
            color:var(--dim); font-size:12.5px; text-decoration:none; }
  .tolink b { color:var(--ink); display:block; }
  .tolink:hover b { color:#b79cff; }
  .tolink .sub2 { font-size:11px; color:var(--faint); }

  #main { flex:1; display:flex; flex-direction:column; min-width:0; }
  #bar { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid var(--line); background:#0d1014; }
  #bar button { font:inherit; font-size:12.5px; border:1px solid var(--line); background:var(--panel); color:var(--dim);
                border-radius:8px; padding:5px 12px; cursor:pointer; }
  #bar button:hover:not(:disabled) { color:var(--ink); }
  #bar button:disabled { opacity:.35; cursor:default; }
  #now { flex:1; min-width:0; font-size:13px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #now .mod { color:#b79cff; font:11px var(--mono); margin-right:8px; }
  #count { font:11px var(--mono); color:var(--faint); }
  #ext { font-size:12px; color:var(--faint); text-decoration:none; }
  #ext:hover { color:var(--ink); }
  #lesson { border-bottom:1px solid var(--line); background:#0e1116; padding:0 16px; }
  #lesson details { padding:9px 0; }
  #lesson summary { cursor:pointer; list-style:none; font-size:13px; color:var(--dim); }
  #lesson summary .qk { font:10px var(--mono); text-transform:uppercase; letter-spacing:.07em; color:#b79cff; margin-right:8px; }
  #lesson .lbody { padding:8px 2px 4px; font-size:13.5px; color:#d3d8de; max-width:900px; }
  #lesson a { color:var(--blue); }
  #frame { flex:1; border:0; width:100%; background:var(--bg); }
</style>
</head>
<body>
<nav id="side" aria-label="Workshop track navigation"></nav>
<div id="main">
  <div id="bar">
    <button id="prev">&larr; prev</button>
    <div id="now"></div>
    <span id="count"></span>
    <button id="next">next &rarr;</button>
    <a id="ext" target="_blank" rel="noopener" title="open widget alone">open &nearr;</a>
  </div>
  <div id="lesson" hidden></div>
  <iframe id="frame" title="workshop widget"></iframe>
</div>

<script src="../assets/cast.js"></script>
<script>
const NAV = [
  { m:"B1 - The front door", items:[
    { label:"A harness is your system, written down", src:"module-b1-the-agent/widgets/front-door/index.html" } ]},
  { m:"B2 - The graph", items:[
    { label:"One task travels a multi-agent system", src:"module-b2-multi-agent/widgets/newsroom/index.html" } ]},
];

const CODE = {
  "B1 - The front door": { href:"https://github.com/ManasviAtGitHub/essence-of-agents/tree/main/bonus/module-b1-the-agent/snip",
    label:"Steal the worked example (snip/ - the full harness + runnable code) &rarr;" },
  "B2 - The graph": { href:"https://github.com/ManasviAtGitHub/essence-of-agents/blob/main/bonus/module-b2-multi-agent/newsroom.py",
    label:"Steal the system (newsroom.py - runnable, keyless --dry-run) &rarr;" },
};

const LESSONS = {
  "B1 - The front door": { q:"You point an agent at a codebase every day. Where does everything it needs to KNOW actually live?",
    aha:"A harness is not code - it is your system's memory OUTSIDE the model: a capped front door (CLAUDE.md / AGENTS.md) read first every session, over a context filesystem - per-subsystem deep-dives, decisions, lessons, a dated log. The real job is token economy: the smallest high-signal set up front, everything else indexed and pulled just-in-time. And it is born two ways: you WALK INTO a system and map it once, or you START one and let the harness grow from real moments (log-before-code). The widget's WATCH mode animates both ways; READ mode opens a complete worked example - a URL shortener with its whole harness, every discipline annotated. Verified as of 2026-07." },
  "B2 - The graph": { q:"One agent and one context window hit a ceiling. How do real systems put MANY models on a single task?",
    aha:"An orchestrator-worker graph - measured ~+90% over a single agent on research tasks at ~15x the tokens (Anthropic), so every box must earn its seat: a 3B router where the call repeats, a 671B reasoner that plans ONCE, MoE instruct workers fanned out in isolated contexts, a 32B critic that can throw a draft back, a 70B synthesizer to write it up. The honest limit: workers that cannot see each other drift (Cognition measured ~32% of multi-agent failures as inter-agent misalignment) - that is exactly why the critic node exists. The widget sends one task through the whole graph, model names and sizes on every box. Verified as of 2026-07." },
};

const side=document.getElementById("side"), frame=document.getElementById("frame"),
      now=document.getElementById("now"), ext=document.getElementById("ext"),
      prev=document.getElementById("prev"), next=document.getElementById("next"),
      count=document.getElementById("count"), lesson=document.getElementById("lesson");

const flat=[]; NAV.forEach(g=>g.items.forEach(it=>flat.push({...it, module:g.m})));

side.innerHTML =
  '<div class="brand"><span class="chr" data-c="cortex" data-e="happy"></span><span class="bt">The Workshop<span class="dot">.</span></span></div>' +
  '<a class="homelink" href="../index.html">&larr; all tracks</a>' +
  '<div class="gnote" style="padding:6px 18px">Bonus - the machinery of real agent systems, small enough to steal. Each module is one standalone, working example: the artifact, the widget, and the code behind it. Two are live; the track grows as pieces clear the bar. Verified as of 2026-07.</div>' +
  NAV.map(g=>'<div class="group"><div class="gh">'+g.m+'</div>'+
    g.items.map(it=>'<button class="navlink" data-src="'+it.src+'">'+it.label+'</button>').join("")+'</div>').join("") +
  '<div class="group"><div class="gh">On the bench - being built</div>' +
  '<div class="gnote" style="padding:2px 18px 6px">The loop (eval-driven improvement) and the swarm (generate-and-verify) - landing here once they clear the same bar.</div></div>' +
  '<a class="tolink" href="../agentic-course/index.html"><b>&larr; The Course</b><span class="sub2">the loop this machinery wraps</span></a>' +
  '<a class="tolink" href="../serving/index.html"><b>&larr; Serving</b><span class="sub2">the engines these systems call</span></a>';

Cast.render(side);

let curIdx=0;
function load(src){
  const i=flat.findIndex(x=>x.src===src); curIdx=i<0?0:i;
  const item=flat[curIdx];
  frame.src=item.src;
  now.innerHTML='<b class="mod">'+item.module+'</b><span class="lbl">'+item.label+'</span>';
  ext.href=item.src;
  count.textContent=(curIdx+1)+" / "+flat.length;
  location.hash=encodeURIComponent(item.src);
  prev.disabled=curIdx===0; next.disabled=curIdx===flat.length-1;
  document.querySelectorAll(".navlink").forEach(a=>a.classList.toggle("active",a.dataset.src===item.src));
  const L=LESSONS[item.module], C=CODE[item.module];
  if(L){ lesson.hidden=false;
    lesson.innerHTML='<details><summary><span class="qk">the question</span>'+L.q+'</summary>'+
      '<div class="lbody"><p><b>The idea:</b> '+L.aha+'</p>'+
      (C?'<a href="'+C.href+'" target="_blank" rel="noopener">'+C.label+'</a>':"")+
      '</div></details>';
  } else { lesson.hidden=true; lesson.innerHTML=""; }
}
side.querySelectorAll(".navlink").forEach(a=>a.onclick=()=>load(a.dataset.src));
prev.onclick=()=>{ if(curIdx>0) load(flat[curIdx-1].src); };
next.onclick=()=>{ if(curIdx<flat.length-1) load(flat[curIdx+1].src); };
const initial=location.hash?decodeURIComponent(location.hash.slice(1)):flat[0].src;
load(initial);
</script>
</body>
</html>
