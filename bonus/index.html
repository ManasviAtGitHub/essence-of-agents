<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Workshop - agents that build</title>
<link rel="stylesheet" href="../assets/theme.css" />
<style>
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body { background:var(--bg); color:var(--ink); font:15px/1.55 system-ui,-apple-system,Segoe UI,sans-serif;
         display:flex; min-height:100vh; }
  #side { width:288px; min-width:288px; border-right:1px solid var(--line); background:#0d1014;
          overflow-y:auto; padding-bottom:24px; }
  .brand { display:flex; align-items:center; gap:10px; padding:16px 18px 8px; }
  .brand .chr svg { width:34px; height:34px; }
  .bt { font-family:var(--serif); font-weight:600; font-size:17px; }
  .dot { color:var(--gold); }
  .homelink { display:block; padding:2px 18px 8px; color:var(--dim); font-size:12.5px; text-decoration:none; }
  .homelink:hover { color:var(--ink); }
  .gnote { color:var(--faint); font-size:11.5px; line-height:1.5; }
  .group { margin-top:10px; }
  .gh { font:10.5px var(--mono); text-transform:uppercase; letter-spacing:.08em; color:var(--faint); padding:6px 18px 4px; }
  .navlink { display:block; width:100%; text-align:left; font:inherit; font-size:13.5px; color:var(--dim);
             background:none; border:0; border-left:2px solid transparent; padding:7px 18px; cursor:pointer; }
  .navlink:hover { color:var(--ink); background:#12161c; }
  .navlink.active { color:var(--ink); border-left-color:var(--gold); background:#12171e; }
  .tolink { display:block; padding:10px 18px; margin-top:14px; border-top:1px solid var(--line);
            color:var(--dim); font-size:12.5px; text-decoration:none; }
  .tolink b { color:var(--ink); display:block; }
  .tolink:hover b { color:var(--gold); }
  .tolink .sub2 { font-size:11px; color:var(--faint); }

  #main { flex:1; display:flex; flex-direction:column; min-width:0; }
  #bar { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid var(--line); background:#0d1014; }
  #bar button { font:inherit; font-size:12.5px; border:1px solid var(--line); background:var(--panel); color:var(--dim);
                border-radius:8px; padding:5px 12px; cursor:pointer; }
  #bar button:hover:not(:disabled) { color:var(--ink); }
  #bar button:disabled { opacity:.35; cursor:default; }
  #now { flex:1; min-width:0; font-size:13px; color:var(--dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #now .mod { color:var(--gold); font:11px var(--mono); margin-right:8px; }
  #count { font:11px var(--mono); color:var(--faint); }
  #ext { font-size:12px; color:var(--faint); text-decoration:none; }
  #ext:hover { color:var(--ink); }
  #lesson { border-bottom:1px solid var(--line); background:#0e1116; padding:0 16px; }
  #lesson details { padding:9px 0; }
  #lesson summary { cursor:pointer; list-style:none; font-size:13px; color:var(--dim); }
  #lesson summary .qk { font:10px var(--mono); text-transform:uppercase; letter-spacing:.07em; color:var(--gold); margin-right:8px; }
  #lesson .lbody { padding:8px 2px 4px; font-size:13.5px; color:#d3d8de; max-width:900px; }
  #lesson a { color:var(--blue); margin-right:16px; }
  #lesson .steal { font:11px var(--mono); color:var(--faint); display:block; margin-top:6px; }
  #frame { flex:1; border:0; width:100%; background:var(--bg); }
</style>
</head>
<body>
<nav id="side" aria-label="Workshop navigation"></nav>
<div id="main">
  <div id="bar">
    <button id="prev">&larr; prev</button>
    <div id="now"></div>
    <span id="count"></span>
    <button id="next">next &rarr;</button>
    <a id="ext" target="_blank" rel="noopener" title="open widget alone">open &nearr;</a>
  </div>
  <div id="lesson" hidden></div>
  <iframe id="frame" title="workshop widget"></iframe>
</div>

<script src="../assets/cast.js"></script>
<script>
// each item: label, src (widget), dir (module dir), card (README/CASE_STUDY), code (the liftable file)
const NAV = [
  { m:"B1 - The agent", items:[
    { label:"A context manager, not just a model", src:"module-b1-the-agent/widgets/context-window/index.html",
      dir:"module-b1-the-agent", card:"README.md", code:"harness.py" } ]},
  { m:"B2 - The verifier", items:[
    { label:"A gate that blocks regressions", src:"module-b2-the-verifier/widgets/the-gate/index.html",
      dir:"module-b2-the-verifier", card:"README.md", code:"evals.py" } ]},
  { m:"B3 - The loop", items:[
    { label:"A metric the agent can climb", src:"module-b3-the-loop/widgets/hill-climb/index.html",
      dir:"module-b3-the-loop", card:"README.md", code:"autoloop.py" } ]},
  { m:"B4 - The swarm", items:[
    { label:"Fan-out for recall, verify for precision", src:"module-b4-the-swarm/widgets/the-swarm/index.html",
      dir:"module-b4-the-swarm", card:"README.md", code:"orchestrate.py" } ]},
  { m:"B5 - A real project", items:[
    { label:"The whole machine (how this course was built)", src:"module-b5-a-real-project/widgets/the-machine/index.html",
      dir:"module-b5-a-real-project", card:"CASE_STUDY.md", code:null } ]},
];

const LESSONS = {
  "B1 - The agent": { q:"You used Claude Code all through this course. What is a coding agent, really - and why does a small model sometimes beat a big one at it?",
    aha:"A coding agent is not the model - it is the CONTEXT MANAGER around it. The tools fetch information; context engineering decides what the model actually SEES each turn. Five moves are the whole harness: a curated working set (not a growing transcript), just-in-time retrieval, compaction when you near the budget, a durable memory file, and a token budget you count every turn - wrapped around a plain tool-use loop whose stop condition is a VERIFIER, never the model's say-so. harness.py is ~260 lines you can lift. Verified as of 2026-07." },
  "B2 - The verifier": { q:"An agent is exactly as good as its verifier. So what does a good one actually look like - and why build it first?",
    aha:"Four composable kinds: a VERIFIABLE check (a test/schema/keyword - cheap and un-gameable, weight it highest), an LLM-JUDGE against a written rubric (for fuzzy quality; gameable, keep it a minority), SELF-CONSISTENCY (sample N, majority-vote), and a GATE that blocks any change whose score regressed vs a saved baseline. Whoever writes the best verifier ships the best agent - so it's the artifact worth your best effort, not an afterthought. evals.py demonstrates the gate catching a real regression. Verified as of 2026-07." },
  "B3 - The loop": { q:"Karpathy's autoresearch loops an agent over nanochat training runs, unattended, overnight. What is the actual shape of that loop?",
    aha:"Give an agent a METRIC and let it hill-climb your code: propose -> apply -> RUN -> measure -> keep-if-better / rollback -> repeat. It's B1's loop with the stop-condition swapped from 'until tests pass' to 'keep the best you've found.' The model only proposes; the verifier decides; git keeps the history (keep = commit, rollback = checkout), so the repo is always at its best state and every step is bisectable. autoloop.py hill-climbs a knob to its hidden peak, git-logged. Verified as of 2026-07." },
  "B4 - The swarm": { q:"For a hard judgment call - is this code correct? is this finding real? - one agent is a coin-flip. How do many agents do better?",
    aha:"Not 'more agents' - two moves that trade breadth for precision. FAN-OUT: N reviewers, each a different lens (correctness/security/perf), run in parallel and unioned - high recall. ADVERSARIAL VERIFY: every candidate faces K skeptics whose job is to REFUTE it against the code; it survives only if a majority fail. That asymmetry (generation is optimistic, refutation is where rigor lives) is what kills plausible-but-wrong findings. It's the exact pass that reviewed this course. orchestrate.py runs it keyless. Verified as of 2026-07." },
  "B5 - A real project": { q:"Put it together: what does a real agentic project actually look like - and how was THIS course built?",
    aha:"productivity = agent x verifier x loop - a multiplication, so a zero anywhere zeroes the whole thing. The agent (B1) proposes, the verifier (B2) is the term most people skip, the loop (B3) makes it improve unattended, and the swarm (B4) sharpens the verifier on judgment calls. A human sets direction and defines 'better.' This very course was built that way across 100+ commits - the CASE_STUDY maps each move to a real incident, including the deploy-gate gap that bit in CI. The models did the typing; the leverage was the harness. Verified as of 2026-07." },
};

const side=document.getElementById("side"), frame=document.getElementById("frame"),
      now=document.getElementById("now"), ext=document.getElementById("ext"),
      prev=document.getElementById("prev"), next=document.getElementById("next"),
      count=document.getElementById("count"), lesson=document.getElementById("lesson");

const flat=[]; NAV.forEach(g=>g.items.forEach(it=>flat.push({...it, module:g.m})));

side.innerHTML =
  '<div class="brand"><span class="chr" data-c="cortex" data-e="happy"></span><span class="bt">The Workshop<span class="dot">.</span></span></div>' +
  '<a class="homelink" href="../index.html">&larr; all tracks</a>' +
  '<div class="gnote" style="padding:6px 18px">The bonus gift: the real machinery behind productive agents, small enough to steal. Each module is a one-page pattern card + a ~40-200 line file that runs keyless (<code>--dry-run</code>) and BYO-key for real. productivity = agent x verifier x loop. Verified as of 2026-07.</div>' +
  NAV.map(g=>'<div class="group"><div class="gh">'+g.m+'</div>'+
    g.items.map(it=>'<button class="navlink" data-src="'+it.src+'">'+it.label+'</button>').join("")+'</div>').join("") +
  '<a class="tolink" href="../serving/index.html"><b>&larr; Essence of Serving</b><span class="sub2">host the model this agent calls</span></a>' +
  '<a class="tolink" href="../frontier/index.html"><b>&larr; Essence of the Frontier</b><span class="sub2">where these agents are heading</span></a>';

Cast.render(side);

let curIdx=0;
function load(src){
  const i=flat.findIndex(x=>x.src===src); curIdx=i<0?0:i;
  const item=flat[curIdx];
  frame.src=item.src;
  now.innerHTML='<b class="mod">'+item.module+'</b><span class="lbl">'+item.label+'</span>';
  ext.href=item.src;
  count.textContent=(curIdx+1)+" / "+flat.length;
  location.hash=encodeURIComponent(item.src);
  prev.disabled=curIdx===0; next.disabled=curIdx===flat.length-1;
  document.querySelectorAll(".navlink").forEach(a=>a.classList.toggle("active",a.dataset.src===item.src));
  const L=LESSONS[item.module];
  if(L){ const REPO="https://github.com/ManasviAtGitHub/essence-of-agents/blob/main/bonus/";
    const cardHref=item.dir+"/"+item.card, codeHref=item.code?REPO+item.dir+"/"+item.code:null;
    lesson.hidden=false;
    lesson.innerHTML='<details><summary><span class="qk">the question</span>'+L.q+'</summary>'+
      '<div class="lbody"><p><b>The idea:</b> '+L.aha+'</p>'+
      '<a href="'+cardHref+'" target="_blank" rel="noopener">Read the pattern card &rarr;</a>'+
      (codeHref?'<a href="'+codeHref+'" target="_blank" rel="noopener">Read the code ('+item.code+') &rarr;</a>':"")+
      (codeHref?'<span class="steal">steal it: python3 '+item.code+' --dry-run  (keyless) &nbsp;|&nbsp; ANTHROPIC_API_KEY=... for real</span>':"")+
      '</div></details>';
  } else { lesson.hidden=true; lesson.innerHTML=""; }
}
side.querySelectorAll(".navlink").forEach(a=>a.onclick=()=>load(a.dataset.src));
prev.onclick=()=>{ if(curIdx>0) load(flat[curIdx-1].src); };
next.onclick=()=>{ if(curIdx<flat.length-1) load(flat[curIdx+1].src); };
const initial=location.hash?decodeURIComponent(location.hash.slice(1)):flat[0].src;
load(initial);
</script>
</body>
</html>
