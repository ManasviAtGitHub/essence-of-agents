<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The loop: propose, verify, keep or roll back</title>
<link rel="stylesheet" href="../../../../assets/theme.css" />
<style>
  body { font:16px/1.55 system-ui,-apple-system,Segoe UI,sans-serif; color:var(--ink);
         background:var(--bg); max-width:760px; margin:30px auto; padding:0 20px 60px; }
  h1 { font-family:var(--serif); font-weight:600; font-size:22px; margin:0 0 4px; }
  .sub { color:var(--dim); margin:0 0 14px; }
  .stage { border:1px solid var(--line); border-radius:12px; background:var(--panel); padding:14px 16px; }
  canvas { width:100%; height:auto; display:block; }
  .readout { display:flex; gap:18px; margin-top:10px; font:12.5px var(--mono); color:var(--dim); flex-wrap:wrap; }
  .readout b { color:var(--ink); }
  .k-keep b { color:var(--green); } .k-roll b { color:var(--red); }
  .caption { font-size:15px; margin:12px 2px; min-height:44px; }
  .caption b { color:var(--ink); }
  .git { margin-top:6px; font:11.5px var(--mono); color:var(--faint); }
  .git .c { color:var(--green); }
</style>
</head>
<body>
<h1>The loop &mdash; a metric the agent can climb</h1>
<p class="sub">The model only <i>proposes</i>. The verifier keeps score. Git keeps the history. (This is <code>autoloop.py</code>, drawn.)</p>

<div class="stage">
  <canvas id="cv" width="680" height="300"></canvas>
  <div class="readout">
    <span>best <b id="rk">K=0.0</b></span>
    <span>metric <b id="rm">-49.0</b></span>
    <span id="rv" class="">proposal <b id="rp">&mdash;</b></span>
    <span>commits <b id="rc">1</b></span>
  </div>
  <div class="git" id="git"></div>
</div>
<div class="caption" id="caption"></div>
<div id="scrub"></div>

<script src="../../../../assets/cast.js"></script>
<script src="../../../../assets/anim.js"></script>
<script>
// Trajectory = the autoloop.py --dry-run recorded run. Each step is self-contained
// (best-so-far + this step's proposal + verdict) so scrubbing to any step is exact.
const F = k => -Math.pow(k - 7, 2);              // the hidden metric; peak 0 at K=7
const TR = [
  { seed:true, best:0,  text:"<b>Seed.</b> Start at K=0, metric -49, and commit it. The loop doesn't know where the peak is - only how to read the metric." },
  { cand:4,   best:4,   v:"keep", text:"<b>Propose K=4.</b> Run it: metric -9, better than -49. <b>Keep</b> - and git commits the improvement." },
  { cand:8,   best:8,   v:"keep", text:"<b>Propose K=8.</b> Metric -1, better still. Keep. Two steps in, it's closing on the peak from the left." },
  { cand:12,  best:8,   v:"roll", text:"<b>Propose K=12.</b> Metric -25 - worse. <b>Roll back:</b> git reverts the file, the best stays K=8. Overshot; now reverse and take a smaller step." },
  { cand:6,   best:8,   v:"roll", text:"<b>Propose K=6.</b> Metric -1, a tie, not an improvement. Roll back - the gate needs <i>better</i>, not equal." },
  { cand:9,   best:8,   v:"roll", text:"<b>Propose K=9.</b> Metric -4, worse. Roll back. The steps keep halving, circling the top." },
  { cand:7.5, best:7.5, v:"keep", text:"<b>Propose K=7.5.</b> Metric -0.25 - the best yet. Keep, commit." },
  { cand:7,   best:7,   v:"keep", text:"<b>Propose K=7.</b> Metric 0 - the peak. Keep. The git log holds only the kept steps: a clean audit trail you can bisect." },
];
// running commit count = 1 (seed) + number of keeps up to & including step i
const commitsAt = i => 1 + TR.slice(1, i + 1).filter(s => s.v === "keep").length;

const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
const W = 680, H = 300, dpr = Math.max(2, window.devicePixelRatio || 1);
cv.width = W * dpr; cv.height = H * dpr; ctx.scale(dpr, dpr);
const css = getComputedStyle(document.documentElement);
const C = n => css.getPropertyValue(n).trim();

const PAD = { l: 44, r: 16, t: 18, b: 34 };
const KMIN = -0.5, KMAX = 14.5, MMIN = -60, MMAX = 6;
const X = k => PAD.l + (k - KMIN) / (KMAX - KMIN) * (W - PAD.l - PAD.r);
const Y = m => PAD.t + (MMAX - m) / (MMAX - MMIN) * (H - PAD.t - PAD.b);

function drawFrame(i) {
  const s = TR[i], best = s.best;
  ctx.clearRect(0, 0, W, H);                       // full clear => immune to scrub-order bugs
  // axes
  ctx.strokeStyle = C("--line"); ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD.l, PAD.t - 6); ctx.lineTo(PAD.l, H - PAD.b); ctx.lineTo(W - PAD.r, H - PAD.b); ctx.stroke();
  ctx.fillStyle = C("--faint"); ctx.font = "11px " + C("--mono");
  ctx.fillText("metric", 6, PAD.t + 4); ctx.fillText("higher is better", 6, PAD.t + 18);
  ctx.textAlign = "center"; ctx.fillText("K (the knob)", (PAD.l + W - PAD.r) / 2, H - 8); ctx.textAlign = "left";
  // the landscape curve (unknown to the agent)
  ctx.strokeStyle = C("--panel2"); ctx.lineWidth = 2; ctx.beginPath();
  for (let k = KMIN; k <= KMAX; k += 0.1) { const x = X(k), y = Y(F(k)); k === KMIN ? ctx.moveTo(x, y) : ctx.lineTo(x, y); }
  ctx.stroke();
  // peak marker (faint, so you can see where it's headed)
  ctx.setLineDash([3, 4]); ctx.strokeStyle = C("--faint"); ctx.beginPath();
  ctx.moveTo(X(7), Y(F(7))); ctx.lineTo(X(7), H - PAD.b); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle = C("--faint"); ctx.textAlign = "center"; ctx.fillText("peak", X(7), Y(0) - 8); ctx.textAlign = "left";
  // path of kept points so far (green trail)
  const kept = TR.slice(0, i + 1).filter(s => s.seed || s.v === "keep");
  ctx.strokeStyle = C("--green"); ctx.globalAlpha = .5; ctx.lineWidth = 1.5; ctx.beginPath();
  kept.forEach((s, j) => { const x = X(s.best), y = Y(F(s.best)); j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y); });
  ctx.stroke(); ctx.globalAlpha = 1;
  // the proposal this step (ghost dot on the curve)
  if (s.cand !== undefined) {
    const kept_ = s.v === "keep", col = kept_ ? C("--green") : C("--red");
    const px = X(s.cand), py = Y(F(s.cand));
    // dashed connector from best-before to proposal
    const bb = TR[i - 1].best;
    ctx.setLineDash([2, 3]); ctx.strokeStyle = col; ctx.globalAlpha = .7;
    ctx.beginPath(); ctx.moveTo(X(bb), Y(F(bb))); ctx.lineTo(px, py); ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha = 1;
    ctx.beginPath(); ctx.arc(px, py, 6, 0, 7); ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.stroke();
    if (!kept_) { // an X over a rolled-back proposal
      ctx.beginPath(); ctx.moveTo(px - 4, py - 4); ctx.lineTo(px + 4, py + 4);
      ctx.moveTo(px + 4, py - 4); ctx.lineTo(px - 4, py + 4); ctx.stroke();
    }
    ctx.fillStyle = col; ctx.font = "11px " + C("--mono"); ctx.textAlign = "center";
    ctx.fillText((kept_ ? "keep" : "roll back") + " K=" + s.cand, px, py - 12); ctx.textAlign = "left";
  }
  // best-so-far (solid green dot)
  const bx = X(best), by = Y(F(best));
  ctx.fillStyle = C("--green"); ctx.beginPath(); ctx.arc(bx, by, 5.5, 0, 7); ctx.fill();
  ctx.strokeStyle = C("--bg"); ctx.lineWidth = 1.5; ctx.stroke();

  // readouts
  document.getElementById("rk").textContent = "K=" + best.toFixed(1);
  document.getElementById("rm").textContent = F(best).toFixed(1);
  document.getElementById("rc").textContent = commitsAt(i);
  const rv = document.getElementById("rv"), rp = document.getElementById("rp");
  if (s.cand === undefined) { rp.textContent = "-"; rv.className = ""; }
  else { rp.textContent = "K=" + s.cand + " -> " + (s.v === "keep" ? "KEEP" : "roll back"); rv.className = s.v === "keep" ? "k-keep" : "k-roll"; }
  document.getElementById("caption").innerHTML = s.text;
  // git log (only kept steps)
  document.getElementById("git").innerHTML = "git log: " +
    kept.slice().reverse().map(s => '<span class="c">' + (s.seed ? "seed(K=0)" : "K=" + s.best) + '</span>').join(" &larr; ");
}

const tl = new Anim.Timeline({ length: TR.length, onStep: drawFrame, autoMs: 1500 });
Anim.scrubber(document.getElementById("scrub"), tl, { label: i => i === 0 ? "seed" : "step " + i + " / " + (TR.length - 1) });
tl.render(0);
</script>
</body>
</html>
