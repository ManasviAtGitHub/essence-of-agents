<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The verifier: a gate that blocks regressions</title>
<link rel="stylesheet" href="../../../../assets/theme.css" />
<style>
  body { font:16px/1.55 system-ui,-apple-system,Segoe UI,sans-serif; color:var(--ink);
         background:var(--bg); max-width:760px; margin:30px auto; padding:0 20px 60px; }
  h1 { font-family:var(--serif); font-weight:600; font-size:22px; margin:0 0 4px; }
  .sub { color:var(--dim); margin:0 0 14px; }
  .stage { border:1px solid var(--line); border-radius:12px; background:var(--panel); padding:14px 16px; }
  canvas { width:100%; height:auto; display:block; }
  .legend { display:flex; gap:16px; margin-top:10px; font:12px var(--mono); color:var(--dim); flex-wrap:wrap; }
  .sw { display:inline-block; width:10px; height:10px; border-radius:2px; vertical-align:middle; margin-right:5px; }
  .caption { font-size:15px; margin:12px 2px; min-height:44px; }
  .caption b { color:var(--ink); }
</style>
</head>
<body>
<h1>The verifier &mdash; build it first, then gate on it</h1>
<p class="sub">A cheap, un-gameable check + a rubric judge roll up to one score. A regression can't merge. (This is <code>evals.py</code>, drawn.)</p>

<div class="stage">
  <canvas id="cv" width="680" height="300"></canvas>
  <div class="legend">
    <span><span class="sw" style="background:var(--blue)"></span>verifiable &times;0.6 (un-gameable)</span>
    <span><span class="sw" style="background:var(--gold)"></span>judge &times;0.4 (rubric)</span>
    <span><span class="sw" style="background:var(--green)"></span>baseline to beat</span>
  </div>
</div>
<div class="caption" id="caption"></div>
<div id="scrub"></div>

<script src="../../../../assets/cast.js"></script>
<script src="../../../../assets/anim.js"></script>
<script>
// The evals.py --dry-run: score a good system (sets baseline), a regressed one
// (blocked), an improved one (passes). score = 0.6*verifiable + 0.4*judge.
const S = [
  { name:"good system",   v:1.0,   j:0.9,   base:null, text:"<b>Score the good system.</b> Verifiable 1.0, judge 0.9 &rarr; <b>0.96</b>. No baseline yet, so this becomes the bar every future change must clear." },
  { name:"a regression",  v:0.667, j:0.633, base:0.96, text:"<b>A change ships that hedges and gets one answer wrong.</b> Score drops to <b>0.653</b> - below the baseline. The gate <b style='color:var(--red)'>BLOCKS</b> it, exactly like a failing test. No human had to notice." },
  { name:"an improvement",v:1.0,   j:0.9,   base:0.96, text:"<b>A real fix.</b> Score back to <b>0.96</b>, clears the bar - the gate <b style='color:var(--green)'>PASSES</b> it and the baseline holds. Verifiable weighs more than judge on purpose: a model can flatter itself, but it can't make a failing check pass." },
];
const EPS = 0.02;
const score = s => +(0.6 * s.v + 0.4 * s.j).toFixed(3);
const pass = s => s.base === null || score(s) >= s.base - EPS;

const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
const W = 680, H = 300, dpr = Math.max(2, window.devicePixelRatio || 1);
cv.width = W * dpr; cv.height = H * dpr; ctx.scale(dpr, dpr);
const css = getComputedStyle(document.documentElement), C = n => css.getPropertyValue(n).trim();

// left: the score bar (0..1). right: the gate.
const BX = 150, BW = 74, B0 = 250, B1 = 40;     // bar geom (y for score 0 and 1)
const Yv = v => B0 - v * (B0 - B1);
function drawFrame(i) {
  const s = S[i], sc = score(s), ok = pass(s);
  ctx.clearRect(0, 0, W, H);
  // scale ticks
  ctx.strokeStyle = C("--line"); ctx.fillStyle = C("--faint"); ctx.font = "10px " + C("--mono"); ctx.lineWidth = 1;
  for (let t = 0; t <= 1.0001; t += 0.25) {
    const y = Yv(t); ctx.globalAlpha = .5; ctx.beginPath(); ctx.moveTo(BX - 8, y); ctx.lineTo(BX + BW + 8, y); ctx.stroke();
    ctx.globalAlpha = 1; ctx.textAlign = "right"; ctx.fillText(t.toFixed(2), BX - 12, y + 3);
  }
  ctx.textAlign = "left";
  // stacked bar: verifiable (blue, weighted) then judge (gold, weighted)
  const vC = 0.6 * s.v, jC = 0.4 * s.j;
  ctx.fillStyle = C("--blue"); ctx.fillRect(BX, Yv(vC), BW, B0 - Yv(vC));
  ctx.fillStyle = C("--gold"); ctx.fillRect(BX, Yv(vC + jC), BW, Yv(vC) - Yv(vC + jC));
  // score label
  ctx.fillStyle = C("--ink"); ctx.font = "600 15px " + C("--mono"); ctx.textAlign = "center";
  ctx.fillText(sc.toFixed(3), BX + BW / 2, Yv(sc) - 8);
  ctx.fillStyle = C("--dim"); ctx.font = "12px " + C("--mono"); ctx.fillText(s.name, BX + BW / 2, B0 + 18);
  ctx.textAlign = "left";
  // baseline line
  if (s.base !== null) {
    const y = Yv(s.base); ctx.strokeStyle = C("--green"); ctx.setLineDash([5, 4]); ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(BX - 12, y); ctx.lineTo(560, y); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = C("--green"); ctx.font = "11px " + C("--mono");
    ctx.fillText("baseline " + s.base + "  (-eps)", BX + BW + 16, y - 6);
  }
  // the gate on the right
  const gx = 470, gTop = 60, gBot = 250, postW = 14, gap = 84;
  ctx.fillStyle = C("--panel2");
  ctx.fillRect(gx, gTop, postW, gBot - gTop); ctx.fillRect(gx + gap, gTop, postW, gBot - gTop);
  // crossbar: up (open) if pass, down (shut) if block
  const barY = ok ? gTop + 6 : gBot - 60;
  ctx.fillStyle = ok ? C("--green") : C("--red");
  ctx.fillRect(gx, barY, gap + postW, 12);
  ctx.globalAlpha = .18; ctx.fillRect(gx, gTop, gap + postW, gBot - gTop); ctx.globalAlpha = 1;
  // verdict text
  ctx.fillStyle = ok ? C("--green") : C("--red"); ctx.font = "600 16px " + C("--mono"); ctx.textAlign = "center";
  ctx.fillText(ok ? "MERGED" : "BLOCKED", gx + (gap + postW) / 2, gBot + 24);
  if (!ok) { ctx.fillStyle = C("--red"); ctx.font = "11px " + C("--mono"); ctx.fillText("regression", gx + (gap + postW) / 2, gBot + 40); }
  ctx.textAlign = "left";

  document.getElementById("caption").innerHTML = s.text;
}

const tl = new Anim.Timeline({ length: S.length, onStep: drawFrame, autoMs: 1800 });
Anim.scrubber(document.getElementById("scrub"), tl, { label: i => ["1 - set baseline", "2 - a regression", "3 - an improvement"][i] });
tl.render(0);
</script>
</body>
</html>
