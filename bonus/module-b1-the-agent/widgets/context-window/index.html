<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The agent is a context manager</title>
<link rel="stylesheet" href="../../../../assets/theme.css" />
<style>
  body { font:16px/1.55 system-ui,-apple-system,Segoe UI,sans-serif; color:var(--ink);
         background:var(--bg); max-width:760px; margin:30px auto; padding:0 20px 60px; }
  h1 { font-family:var(--serif); font-weight:600; font-size:22px; margin:0 0 4px; }
  .sub { color:var(--dim); margin:0 0 14px; }
  .stage { border:1px solid var(--line); border-radius:12px; background:var(--panel); padding:14px 16px; }
  canvas { width:100%; height:auto; display:block; }
  .caption { font-size:15px; margin:12px 2px; min-height:44px; }
  .caption b { color:var(--ink); }
</style>
</head>
<body>
<h1>The agent &mdash; a context manager, not just a model</h1>
<p class="sub">The tools <i>fetch</i>; context engineering decides what the model actually <i>sees</i> each turn. Watch the five moves keep a long run alive. (This is <code>harness.py</code>, drawn.)</p>

<div class="stage">
  <canvas id="cv" width="680" height="320"></canvas>
</div>
<div class="caption" id="caption"></div>
<div id="scrub"></div>

<script src="../../../../assets/cast.js"></script>
<script src="../../../../assets/anim.js"></script>
<script>
// Each step is a full snapshot of the working set (blocks that sum to `used`), so
// scrubbing anywhere is exact. b(kind, tok, label). BUDGET is the ceiling move #5.
const BUDGET = 6000;
const b = (k, t, l) => ({ k, t, l });
const SYS = b("sys", 900, "system"), TASK = b("task", 200, "task");
const mem = (t, l) => b("mem", t, l);
const turn = (t, l) => b("turn", t, l);
const sumBlk = (t, l) => b("sum", t, l);

const STEPS = [
  { move:"working set", blocks:[SYS, mem(300, "memory"), TASK, turn(800, "run tests -> fail")],
    text:"<b>Move 1 - the working set.</b> Not a transcript that grows forever: a curated set - system + memory + task + only the results that matter." },
  { move:"just-in-time", blocks:[SYS, mem(300, "memory"), TASK, turn(800, "run tests -> fail"), turn(1400, "read mathlib.py")],
    text:"<b>Move 2 - just-in-time.</b> The tools pull a file on demand (read mathlib.py) instead of front-loading the whole repo. Context grows only with what's needed." },
  { move:"budget", blocks:[SYS, mem(300, "memory"), TASK, turn(800, "run tests -> fail"), turn(1400, "read mathlib.py"), turn(1500, "reason + read test")],
    text:"<b>Move 5 - budget.</b> Every turn is counted (~4 chars/token). We're near the ceiling now; a naive agent would just keep appending until it blows the window." },
  { move:"budget", over:true, blocks:[SYS, mem(300, "memory"), TASK, turn(800, "run tests -> fail"), turn(1400, "read mathlib.py"), turn(1500, "reason + read test"), turn(1400, "more output")],
    text:"<b>Over budget.</b> One more turn and the working set exceeds the window (red). This is where long agent runs die - unless&hellip;" },
  { move:"compaction", blocks:[SYS, mem(300, "memory"), TASK, sumBlk(600, "compacted: earlier turns"), turn(1400, "reason + read test")],
    text:"<b>Move 3 - compaction.</b> Summarize the old turns into one note (decisions + current state), drop the detail, keep the last few. The bar drops; the run continues. This is what lets an agent work for hours." },
  { move:"memory", blocks:[SYS, mem(550, "memory + new durable fact"), TASK, sumBlk(600, "compacted: earlier turns"), turn(1400, "reason + read test"), turn(900, "write fix to mathlib.py")],
    text:"<b>Move 4 - memory.</b> A durable fact is appended to the memory file - it survives compaction, and the next run starts already knowing it. The fix gets written." },
  { move:"verifier", done:true, blocks:[SYS, mem(550, "memory + new durable fact"), TASK, sumBlk(600, "compacted: earlier turns"), turn(1400, "reason + read test"), turn(900, "write fix to mathlib.py"), turn(700, "run tests -> exit 0")],
    text:"<b>The loop stops on the verifier, not the model.</b> Tests exit 0, so DONE is real. Five context moves kept a small model on task the whole way - that is the harness." },
];
const COL = { sys:"--blue", mem:"--gold", task:"--green", turn:"--panel2", sum:"--bright" };
const MOVES = ["working set", "just-in-time", "compaction", "memory", "budget"];

const cv = document.getElementById("cv"), ctx = cv.getContext("2d");
const W = 680, H = 320, dpr = Math.max(2, window.devicePixelRatio || 1);
cv.width = W * dpr; cv.height = H * dpr; ctx.scale(dpr, dpr);
const css = getComputedStyle(document.documentElement), C = n => css.getPropertyValue(n).trim();

const BX = 40, BW = 150, B0 = 288, B1 = 40;          // bar: y for 0 tok and for BUDGET tok
const Yt = t => B0 - (t / BUDGET) * (B0 - B1);

function drawFrame(i) {
  const s = STEPS[i], used = s.blocks.reduce((a, x) => a + x.t, 0);
  ctx.clearRect(0, 0, W, H);
  // ceiling line = budget
  ctx.strokeStyle = C("--red"); ctx.setLineDash([5, 4]); ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(BX - 8, B1); ctx.lineTo(BX + BW + 8, B1); ctx.stroke(); ctx.setLineDash([]);
  ctx.fillStyle = C("--red"); ctx.font = "11px " + C("--mono"); ctx.fillText("window budget " + BUDGET, BX, B1 - 8);
  // stacked blocks (bottom-up)
  let y = B0;
  for (const bl of s.blocks) {
    const h = (bl.t / BUDGET) * (B0 - B1), top = y - h;
    const over = top < B1;
    ctx.fillStyle = over ? C("--red") : C(COL[bl.k]); ctx.globalAlpha = bl.k === "turn" ? .85 : 1;
    ctx.fillRect(BX, top, BW, h - 2); ctx.globalAlpha = 1;
    if (h > 15) { ctx.fillStyle = bl.k === "turn" ? C("--dim") : C("--bg"); ctx.font = "10px " + C("--mono");
      ctx.fillText(bl.l.slice(0, 24), BX + 6, top + h / 2 + 3); }
    y = top;
  }
  // used readout
  ctx.fillStyle = used > BUDGET ? C("--red") : C("--ink"); ctx.font = "600 13px " + C("--mono");
  ctx.fillText(used + " / " + BUDGET + " tok", BX, B0 + 22);

  // the five moves list on the right, active one lit
  ctx.font = "13px " + C("--mono");
  MOVES.forEach((m, k) => {
    const yy = 70 + k * 34, on = s.move === m;
    ctx.fillStyle = on ? (s.over ? C("--red") : C("--green")) : C("--faint");
    ctx.fillText((on ? "> " : "  ") + (k + 1) + ". " + m, 300, yy);
  });
  ctx.fillStyle = C("--faint"); ctx.font = "11px " + C("--mono");
  ctx.fillText("the five context moves", 300, 44);
  if (s.done) { ctx.fillStyle = C("--green"); ctx.font = "600 14px " + C("--mono"); ctx.fillText("OK verifier agrees -> DONE", 300, 258); }

  document.getElementById("caption").innerHTML = s.text;
}

const tl = new Anim.Timeline({ length: STEPS.length, onStep: drawFrame, autoMs: 1900 });
Anim.scrubber(document.getElementById("scrub"), tl, { label: i => "turn " + (i + 1) + " / " + STEPS.length });
tl.render(0);
</script>
</body>
</html>
