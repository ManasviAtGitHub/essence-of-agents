<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Essence of Agents - widgets</title>
<link rel="stylesheet" href="../assets/theme.css" />
<style>
  * { box-sizing:border-box; }
  body { margin:0; display:flex; height:100vh; overflow:hidden;
         font:15px/1.5 system-ui,-apple-system,Segoe UI,sans-serif; color:var(--ink); background:var(--bg); }
  #side { width:276px; flex:none; background:var(--side); border-right:1px solid var(--line);
          overflow:auto; padding:16px 0 40px; }
  .brand { display:flex; align-items:center; gap:10px; padding:0 18px 2px; }
  .brand .chr svg { width:34px; height:34px; }
  .brand .bt { font-family:var(--serif); font-weight:600; font-size:17px; }
  .brand .bt .dot { color:var(--gold); }
  .group { margin-top:8px; }
  .gh { font-size:11px; color:var(--faint); text-transform:uppercase; letter-spacing:.12em; padding:12px 18px 4px; }
  .gnote { font-size:12px; color:var(--faint); font-style:italic; padding:0 18px 4px; }
  .navlink { display:block; width:100%; text-align:left; border:0; border-left:2px solid transparent; background:none; cursor:pointer;
             font:inherit; color:var(--dim); padding:7px 18px 7px 26px; }
  .navlink:hover { background:#12161c; color:var(--ink); }
  .navlink.active { color:var(--ink); border-left-color:var(--blue); background:#12171e; }
  main { flex:1; display:flex; flex-direction:column; min-width:0; }
  #bar { height:46px; flex:none; display:flex; align-items:center; gap:12px;
         border-bottom:1px solid var(--line); padding:0 16px; background:var(--side); }
  #now .mod { font-weight:600; }
  #now .lbl { color:var(--dim); margin-left:8px; }
  .count { color:var(--faint); font:12px var(--mono); margin-left:10px; }
  .navbtn { font:inherit; font-size:13px; border:1px solid var(--line); background:none; color:var(--ink);
            padding:5px 12px; border-radius:7px; cursor:pointer; }
  .navbtn:hover:not(:disabled) { border-color:var(--blue); color:var(--blue); }
  .navbtn:disabled { opacity:.35; cursor:default; }
  .navbtn.go { border-color:var(--gold); color:var(--gold); }
  #prev { margin-right:12px; }
  #next { margin-left:auto; }
  #ext { margin-left:14px; color:var(--blue); text-decoration:none; font-size:13px; }
  #ext:hover { text-decoration:underline; }
  iframe { flex:1; width:100%; border:0; background:var(--bg); }
  .homelink { display:block; padding:0 18px 10px 62px; margin-top:-4px; color:var(--dim); font-size:12px; text-decoration:none; }
  .homelink:hover { color:var(--blue); }
  .tolink { display:block; margin:16px 14px 4px; padding:11px 13px; border:1px solid var(--line);
            border-left:3px solid var(--gold); border-radius:9px; color:var(--ink); text-decoration:none; }
  .tolink:hover { border-color:var(--gold); background:#12171e; }
  .tolink b { color:var(--gold); font-weight:600; }
  .tolink .sub2 { display:block; color:var(--dim); font-size:12px; margin-top:1px; }
  #lesson { flex:none; border-bottom:1px solid var(--line); background:#0e1319; }
  #lesson[hidden] { display:none; }
  #lesson summary { cursor:pointer; padding:9px 18px; color:var(--ink); font-size:13.5px; list-style:none; }
  #lesson summary::-webkit-details-marker { display:none; }
  #lesson summary .qk { color:var(--faint); font:11px var(--mono); text-transform:uppercase; letter-spacing:.1em; margin:0 8px; }
  #lesson summary .caret { color:var(--faint); }
  #lesson details[open] summary .caret { color:var(--blue); }
  #lesson .lbody { padding:0 18px 12px 42px; color:var(--dim); font-size:13.5px; }
  #lesson .lbody b { color:var(--gold); }
  #lesson .lbody a { color:var(--blue); text-decoration:none; font-size:12.5px; }
  #lesson .lbody a:hover { text-decoration:underline; }
</style>
</head>
<body>
<nav id="side"></nav>
<main>
  <header id="bar">
    <button id="prev" class="navbtn">&larr; Prev</button>
    <span id="now"></span><span id="count" class="count"></span>
    <button id="next" class="navbtn">Next &rarr;</button>
    <a id="ext" target="_blank" rel="noopener">open in new tab &#8599;</a>
  </header>
  <div id="lesson" hidden></div>
  <iframe id="frame" title="widget"></iframe>
</main>

<script src="../assets/cast.js"></script>
<script>
const NAV = [
  { m:"Start here", items:[
    { label:"About this course", src:"about.html" },
  ]},
  { m:"Module 0 - The smallest agent", items:[
    { label:"Watch it run twice", src:"module-00-smallest-agent/widgets/run-again/index.html" },
  ]},
  { m:"Module 1 - Hands (tools)", items:[
    { label:"Growing hands", src:"module-01-hands/widgets/growing-hands/index.html" },
  ]},
  { m:"Module 2 - The loop", items:[
    { label:"Watch the loop turn", src:"module-02-the-loop/widgets/loop-cycle/index.html" },
    { label:"Delete the think step", src:"module-02-the-loop/widgets/think-toggle/index.html" },
  ]},
  { m:"Module 3 - Context is the only lever", items:[
    { label:"Context lever", src:"module-03-context/widgets/context-lever/index.html" },
    { label:"The context window", src:"module-03-context/widgets/context-window/index.html" },
    { label:"Why the answer changes", src:"module-03-context/widgets/distribution/index.html" },
  ]},
  { m:"Module 4 - Memory & retrieval", items:[
    { label:"The similarity space", src:"module-04-memory/widgets/similarity-space/index.html" },
    { label:"The librarian", src:"module-04-memory/widgets/librarian/index.html" },
  ]},
  { m:"Module 5 - Planning", items:[
    { label:"Watch a plan break", src:"module-05-planning/widgets/plan-rewrite/index.html" },
    { label:"Plan, fail, re-plan", src:"module-05-planning/widgets/plan-replan/index.html" },
  ]},
  { m:"Module 6 - Verification", items:[
    { label:"The verifier loop", src:"module-06-verification/widgets/verify-loop/index.html" },
  ]},
  { m:"Module 7 - Reasoning models", items:[
    { label:"Think inside, act outside", src:"module-07-reasoning/widgets/inside-outside/index.html" },
  ]},
  { m:"Module 8 - Many agents", items:[
    { label:"Team flow", src:"module-08-multi-agent/widgets/team-flow/index.html" },
  ]},
  { m:"Module 9 - Reliability & security", items:[
    { label:"Injection, step by step", src:"module-09-security/widgets/injection-flow/index.html" },
    { label:"Try your own injection", src:"module-09-security/widgets/prompt-injection/index.html" },
  ]},
  { m:"Module 10 - Evaluation", items:[
    { label:"The eval grid", src:"module-10-evaluation/widgets/eval-grid/index.html" },
  ]},
  { m:"Module 11 - Shipping", items:[
    { label:"The feedback loop", src:"module-11-shipping/widgets/feedback-loop/index.html" },
  ]},
  { m:"Capstone", items:[
    { label:"The choice is the lesson", src:"module-12-capstone/widgets/capstone-chooser/index.html" },
    { label:"Watch a capstone run", src:"module-12-capstone/widgets/capstone-sim/index.html" },
  ]},
];

// The written lesson (Question -> Aha) surfaced per module, above the widget.
const LESSONS = {
  "Module 0 - The smallest agent": { q:"What even is an agent, underneath the hype?", aha:"An LLM is close to a pure function - context in, a distribution over next tokens out, no memory between calls. An agent is just a loop you wrap around it." },
  "Module 1 - Hands (tools)": { q:"The model can only emit text. How does it actually DO anything?", aha:"You give it tools. A tool call is the model asking your code to act - it gains hands, not new knowledge." },
  "Module 2 - The loop": { q:"How do a model and some tools become an agent?", aha:"A while-loop: call the model, run any tool it asks for, feed the result back, and repeat until it answers instead of calling a tool." },
  "Module 3 - Context is the only lever": { q:"The model's weights are fixed. What can you actually control?", aha:"Only the context. What you put in the window - and what falls out of it - decides what comes out." },
  "Module 4 - Memory & retrieval": { q:"The window is tiny and the model forgets. How does it 'remember'?", aha:"Memory IS the message list. Retrieval picks the few notes nearest the question in meaning and inserts only those." },
  "Module 5 - Planning": { q:"How does an agent handle a task too big for one step?", aha:"It plans - and treats the plan as a hypothesis, re-planning when a step meets reality and breaks." },
  "Module 6 - Verification": { q:"'Looks right' is not 'is right'. How do you know the output is good?", aha:"Add a verifier. A cheap checker turns a guess into a self-correcting loop." },
  "Module 7 - Reasoning models": { q:"When should the model think harder versus just do more?", aha:"Two levers: reason INSIDE the model (spend tokens) or act OUTSIDE in the loop (call a tool). Match the lever to the task." },
  "Module 8 - Many agents": { q:"Is more agents always better?", aha:"No - the right SHAPE is. Parallel agents help only when the work is independent; otherwise they just add coordination tax." },
  "Module 9 - Reliability & security": { q:"The agent reads untrusted text. What could go wrong?", aha:"The model cannot tell data from instructions - both are just tokens. Guard what enters the context and what actions are allowed." },
  "Module 10 - Evaluation": { q:"You tweaked the prompt and it 'feels' better. Is it?", aha:"Feelings are not measurement. A fixed eval set catches the regressions your gut misses." },
  "Module 11 - Shipping": { q:"How does a shipped agent keep getting better?", aha:"Close the loop: every real production failure becomes a new test in your eval set." },
  "Capstone": { q:"Which agent should you build first?", aha:"The choice is the lesson - each path stresses a different muscle you just built." },
};

const side = document.getElementById("side");
const frame = document.getElementById("frame");
const now = document.getElementById("now");
const ext = document.getElementById("ext");
const prev = document.getElementById("prev");
const next = document.getElementById("next");
const count = document.getElementById("count");
const lesson = document.getElementById("lesson");

const flat = [];
NAV.forEach(g => g.items.forEach(it => flat.push({ ...it, module: g.m })));

side.innerHTML =
  `<div class="brand"><span class="chr" data-c="cortex" data-e="happy"></span><span class="bt">Essence of Agents<span class="dot">.</span></span></div>` +
  `<a class="homelink" href="../index.html">&larr; all tracks</a>` +
  NAV.map(g => `
    <div class="group">
      <div class="gh">${g.m}</div>
      ${g.note ? `<div class="gnote">${g.note}</div>` : ""}
      ${g.items.map(it => `<button class="navlink" data-src="${it.src}">${it.label}</button>`).join("")}
    </div>`).join("") +
  `<a class="tolink" href="../production/index.html"><b>Production track &rarr;</b><span class="sub2">the sequel: ship this agent for real</span></a>`;

Cast.render(side);

let curIdx = 0;
const PROD = "../production/index.html";

function load(src) {
  const i = flat.findIndex(x => x.src === src);
  curIdx = i < 0 ? 0 : i;
  const item = flat[curIdx];
  frame.src = item.src;
  now.innerHTML = `<b class="mod">${item.module}</b><span class="lbl">${item.label}</span>`;
  ext.href = item.src;
  count.textContent = `${curIdx + 1} / ${flat.length}`;
  location.hash = encodeURIComponent(item.src);
  prev.disabled = curIdx === 0;
  const last = curIdx === flat.length - 1;
  next.innerHTML = last ? "Production track &rarr;" : "Next &rarr;";
  next.classList.toggle("go", last);
  document.querySelectorAll(".navlink").forEach(a => a.classList.toggle("active", a.dataset.src === item.src));

  // surface the written lesson for this module
  const L = LESSONS[item.module];
  if (L) {
    const readme = item.src.includes("/widgets/") ? item.src.split("/widgets/")[0] + "/README.md" : null;
    lesson.hidden = false;
    lesson.innerHTML =
      `<details><summary><span class="caret">&#9656;</span><span class="qk">the question</span>${L.q}</summary>` +
      `<div class="lbody"><p><b>The idea:</b> ${L.aha}</p>` +
      (readme ? `<a href="${readme}" target="_blank" rel="noopener">Read the full written lesson (README) &rarr;</a>` : "") +
      `</div></details>`;
  } else {
    lesson.hidden = true;
    lesson.innerHTML = "";
  }
}

side.querySelectorAll(".navlink").forEach(a => (a.onclick = () => load(a.dataset.src)));
prev.onclick = () => { if (curIdx > 0) load(flat[curIdx - 1].src); };
next.onclick = () => { if (curIdx < flat.length - 1) load(flat[curIdx + 1].src); else window.location.href = PROD; };

const initial = location.hash ? decodeURIComponent(location.hash.slice(1)) : flat[0].src;
load(initial);
</script>
</body>
</html>
