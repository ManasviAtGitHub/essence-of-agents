name: deploy-pages

# Build the static site (dist/) and publish it to GitHub Pages on every push to main.
# Everything is keyless/offline: the gates below need no API key and no pip installs.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # fast gates before publishing (stdlib-only, keyless)
      - name: course module checks
        run: python tests/test_modules.py
      - name: structure invariants
        run: python tests/test_structure.py
      - name: no stale UI links
        run: python tools/check_links.py
      - name: build the static site
        run: python tools/build_dist.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
